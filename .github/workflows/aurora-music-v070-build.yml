name: Aurora Music Android v0.7.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/aurora-music-v070-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/aurora-music-v070-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-music-v070-${{ github.ref }}
  cancel-in-progress: true

jobs:
  music_android:
    name: Aurora Music Android v0.7.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Senkron LRC sözleşmesi
        run: |
          grep -q 'versionName = "0.7.0"' app/build.gradle.kts
          grep -q 'object LrcParser' app/src/main/kotlin/com/apexlions/music/LrcParser.kt
          grep -q 'SyncedLyricsPane' app/src/main/kotlin/com/apexlions/music/AuroraV4Activity.kt
          grep -q 'animateScrollToItem' app/src/main/kotlin/com/apexlions/music/SyncedLyricsPane.kt
          grep -q 'onSeek(line.timeMs)' app/src/main/kotlin/com/apexlions/music/SyncedLyricsPane.kt
      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.7.0.apk
          sha256sum yayin/Aurora-Music-Android-v0.7.0.apk > yayin/SHA256SUMS-Aurora-Music-v0.7.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.7.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.7.0 --cleanup-tag --yes || true
          gh release create v0.7.0 yayin/* \
            --title "Aurora Music Android v0.7.0" \
            --notes "Apple Music tarzı senkronize sözler: aktif satır otomatik ortalanır, geçmiş ve gelecek satırlar kısılır, satıra dokununca şarkı o zaman koduna gider. LRC ayrıştırıcısı zaman damgasından sonraki boşlukları ve tek satıra birleşmiş zaman kodlarını destekler."
