name: Aurora v0.3.2 Mobile Studio Patch

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Kaynak yamasını uygula
        run: python tools/aurora_v032_patch.py

      - name: PC Studio Python doğrulaması
        run: |
          python -m py_compile pc/AuroraStudio.py
          grep -q 'APP_VERSION = "0.2.3"' pc/AuroraStudio.py
          grep -q 'HF_HUB_DISABLE_PROGRESS_BARS' pc/AuroraStudio.py
          ! grep -q 'HF_HUB_DISABLE_XET' pc/AuroraStudio.py
          grep -q 'featuredArtistNames' pc/AuroraStudio.py

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Android 36 paketleri
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Android uygulamalarını derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug :studioapp:assembleDebug

      - name: Doğrulanan kaynakları dala yaz
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app pc catalog/schema.json studioapp settings.gradle.kts
          if git diff --cached --quiet; then
            echo "Kaynak değişikliği yok."
          else
            git commit -m "Android v0.3.2, PC Studio v0.2.3 ve Studio Mobile v0.1.0"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
