name: Diagnose Aurora v0.6 Stability

on:
  push:
    branches: [fix/aurora-v060-stability]
    paths: [.github/workflows/diagnose-v060.yml]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aurora-v060-stability
          fetch-depth: 0
      - name: Kaynak ağacını ve ilgili kodları çıkar
        shell: bash
        run: |
          mkdir -p diagnostics
          find app/src/main studioapp/src/main pc -type f | sort > diagnostics/files.txt
          {
            echo '=== HUGGING FACE CLASSES ==='
            grep -RIn -E 'class HuggingFace|uploadAndCommit|createCommit|create_commit|summary|commit.*Hugging|PendingUpload' studioapp/src/main pc || true
            echo '=== IMPORT REQUEST ==='
            grep -RIn -E 'class ImportRequest|ImportRequest\(|animated_cover_path|animatedCover|animated_cover' pc || true
            echo '=== PLAYBACK START/SERVICE ==='
            grep -RIn -E 'startForegroundService|startService\(|AuroraPlaybackEngine|MediaSessionService|PlayerController\(' app/src/main || true
          } > diagnostics/matches.txt
          python - <<'PY'
          from pathlib import Path
          roots = [Path('studioapp/src/main'), Path('pc'), Path('app/src/main')]
          needles = ['class HuggingFace', 'uploadAndCommit', 'class ImportRequest', 'animated_cover_path', 'startForegroundService', 'AuroraPlaybackEngine']
          out=[]
          for root in roots:
              for p in root.rglob('*'):
                  if not p.is_file() or p.suffix not in {'.kt','.py','.xml','.kts'}:
                      continue
                  try: lines=p.read_text(encoding='utf-8').splitlines()
                  except Exception: continue
                  hits=[i for i,l in enumerate(lines) if any(n in l for n in needles)]
                  if not hits: continue
                  out.append(f'\n===== {p} =====')
                  spans=[]
                  for i in hits:
                      spans.append((max(0,i-35), min(len(lines),i+80)))
                  merged=[]
                  for a,b in sorted(spans):
                      if merged and a<=merged[-1][1]: merged[-1]=(merged[-1][0],max(merged[-1][1],b))
                      else: merged.append((a,b))
                  for a,b in merged:
                      for j in range(a,b): out.append(f'{j+1:04d}: {lines[j]}')
          Path('diagnostics/snippets.txt').write_text('\n'.join(out), encoding='utf-8')
          PY
      - name: Tanıyı dala kaydet
        run: |
          git config user.name 'Aurora Diagnostics Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add diagnostics
          git commit -m 'Aurora v0.6 hata kaynaklarını raporla'
          git push origin HEAD:fix/aurora-v060-stability
