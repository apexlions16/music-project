name: Verify Windows Studio v0.6

on:
  push:
    branches:
      - feature/aurora-upcoming-audio-matcher
    paths:
      - ".github/workflows/verify-windows-studio-v060.yml"
      - "pc/AuroraStudioV6Entry.py"
      - "pc/AuroraStudioV6Final.py"

permissions:
  contents: write

concurrency:
  group: verify-windows-studio-v060
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-upcoming-audio-matcher
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıkları kur
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
      - name: Final UI, eşleştirme ve PyInstaller doğrulaması
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $env:QT_QPA_PLATFORM = "offscreen"
          New-Item -ItemType Directory -Force verification | Out-Null
          $log = "verification\windows-studio-v060-build.txt"
          try {
            python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py
            if ($LASTEXITCODE -ne 0) { throw "Python derleme başarısız" }
            python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV6Final as entry; app=QApplication([]); w=entry.AuroraStudioV6Final(); titles=[w.nav.item(i).text() for i in range(w.nav.count())]; assert w.nav.count()==8,titles; assert w.pages.count()==8,w.pages.count(); assert 'Yayın Kütüphanesi' in titles; assert 'Yakında Tamamlama' in titles; assert 'Yayınlar' not in titles; assert 'Şarkılar' not in titles; assert w.cover_fetch_btn_v3.isHidden(); print('UI_OK',titles); w.close()"
            if ($LASTEXITCODE -ne 0) { throw "Qt final UI testi başarısız" }
            python -c "import sys; sys.path.insert(0,'pc'); from pathlib import Path; from AuroraStudioV6Entry import match_media; r=match_media(['Birinci Şarkı','İkinci Şarkı'],[Path('02 - Ikinci Sarki.flac'),Path('01 Birinci Sarki (Official Audio).flac')]); assert r=={0:1,1:0},r; print('MATCH_OK',r)"
            if ($LASTEXITCODE -ne 0) { throw "Dosya eşleştirme testi başarısız" }
            pyinstaller --noconfirm --clean --windowed --onedir --name AuroraStudioVerify --paths pc --collect-all huggingface_hub --collect-all PySide6 --hidden-import AuroraStudio --hidden-import AuroraStudioV3 --hidden-import AuroraStudioV3Entry --hidden-import AuroraStudioV4Entry --hidden-import AuroraStudioV6Entry --hidden-import win32timezone pc/AuroraStudioV6Final.py
            if ($LASTEXITCODE -ne 0) { throw "PyInstaller doğrulaması başarısız" }
            @"
          SUCCESS
          version=0.6.0
          nav_count=8
          page_count=8
          unified_library=true
          upcoming_completion=true
          media_match=true
          pyinstaller=true
          cover_fetch_hidden=true
          "@ | Set-Content -Encoding utf8 $log
          } catch {
            "FAILURE`n$($_.Exception.Message)" | Set-Content -Encoding utf8 $log
            Get-Content $log
            exit 1
          }
          Get-Content $log
      - name: Sonucu dala kaydet
        if: always()
        shell: pwsh
        run: |
          git config user.name "Aurora Windows Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/windows-studio-v060-build.txt
          if (git diff --cached --quiet) { Write-Host "Sonuç değişmedi"; exit 0 }
          git commit -m "Studio Windows v0.6 doğrulama sonucunu kaydet"
          git pull --rebase origin feature/aurora-upcoming-audio-matcher
          git push origin HEAD:feature/aurora-upcoming-audio-matcher
