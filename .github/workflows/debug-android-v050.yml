name: Debug Aurora Android v0.5 Final

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/debug-android-v050.yml"
      - "app/**"
      - "studioapp/**"

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Android derleme çıktısını al
        id: build
        shell: bash
        run: |
          set +e
          gradle --no-daemon --stacktrace --console=plain :app:assembleDebug :studioapp:assembleDebug > android-v050-build.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Logu dala kaydet
        run: |
          mkdir -p verification
          cp android-v050-build.log verification/android-v050-build.log
          {
            echo "source_commit=${GITHUB_SHA}"
            echo "exit_code=${{ steps.build.outputs.exit_code }}"
            echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > verification/android-v050-result.txt
          git config user.name "Aurora Debug Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/android-v050-build.log verification/android-v050-result.txt
          git commit -m "Android v0.5 derleme çıktısını kaydet" || exit 0
          git pull --rebase origin agent/aurora-studios-v030
          git push origin HEAD:agent/aurora-studios-v030
