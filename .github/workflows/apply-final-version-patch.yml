name: Apply Aurora Final Versions

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - "tools/final_version_patch.py"
      - ".github/workflows/apply-final-version-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - name: Sürüm yamasını uygula
        run: python tools/final_version_patch.py
      - name: Değişiklikleri kaydet
        run: |
          git config user.name "Aurora Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add app studioapp pc .github/workflows/aurora-v030-build.yml
          git commit -m "Aurora Music v0.5 ve Studio v0.4 sürümlerini hazırla"
          git pull --rebase origin agent/aurora-studios-v030
          git push origin HEAD:agent/aurora-studios-v030
