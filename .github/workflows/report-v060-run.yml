name: Report Aurora v0.6 Run

on:
  push:
    branches: [main]
    paths: [.github/workflows/report-v060-run.yml]

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Final run listesini al
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 10
          mkdir -p release-status
          gh run list --repo "$GITHUB_REPOSITORY" --workflow aurora-final-v060-build.yml --limit 5 \
            --json databaseId,status,conclusion,headSha,event,createdAt,updatedAt,url \
            > release-status/aurora-v060-immediate-runs.json
      - name: Raporu kaydet
        run: |
          git config user.name "Aurora Workflow Reporter"
          git config user.email "actions@users.noreply.github.com"
          git add release-status/aurora-v060-immediate-runs.json
          git commit -m "Aurora v0.6 final workflow durumunu kaydet"
          git pull --rebase origin main
          git push origin HEAD:main
