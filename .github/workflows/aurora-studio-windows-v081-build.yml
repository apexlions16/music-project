name: Aurora Studio Windows v0.8.1 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "pc/**"
      - ".github/workflows/aurora-studio-windows-v081-build.yml"
  push:
    branches: [main]
    paths:
      - "pc/**"
      - ".github/workflows/aurora-studio-windows-v081-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-studio-windows-v081-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio_windows:
    name: Aurora Studio Windows v0.8.1
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıklar ve kaynak doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py pc/AuroraStudioV7Final.py pc/AuroraStudioV8Final.py pc/AuroraStudioV81Final.py
          if (-not (Select-String -Path pc/AuroraStudioV81Final.py -Pattern 'APP_VERSION = "0.8.1"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV81Final.py -Pattern 'LRC Dosyalarını Toplu Seç ve İsimlerle Eşleştir' -Quiet)) { throw 'Toplu LRC düğmesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV81Final.py -Pattern 'match_lrc_files_v81' -Quiet)) { throw 'Toplu LRC isim eşleştirme motoru eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV81Final.py -Pattern 'normalize_lrc_v7' -Quiet)) { throw 'LRC doğrulama motoru kullanılmıyor' }

      - name: İsim eşleştirme ve LRC birim kontrolü
        shell: pwsh
        run: |
          python -c "import sys; from pathlib import Path; sys.path.insert(0,'pc'); from AuroraStudioV81Final import match_lrc_files_v81, normalize_lrc_media_name_v81; from AuroraStudioV7Final import normalize_lrc_v7; tracks=['Ba\u015f\u0131m Belada','Uzaklara','Son Gece']; files=[Path('03 - Son Gece.lrc'),Path('01 Basim Belada.lrc'),Path('02_Uzaklara.lrc')]; m,methods=match_lrc_files_v81(tracks,files); assert normalize_lrc_media_name_v81('Ba\u015f\u0131m Belada')=='basim belada'; assert files[m[0]].name=='01 Basim Belada.lrc',m; assert methods[0]=='kesin isim e\u015fle\u015fmesi',methods; assert files[m[1]].name=='02_Uzaklara.lrc',m; assert files[m[2]].name=='03 - Son Gece.lrc',m; out=normalize_lrc_v7('[00:00.64] Ilk satir [00:04.40] Ikinci satir'); assert out.splitlines()==['[00:00.64]Ilk satir','[00:04.40]Ikinci satir'],out; print('Toplu LRC eslestirme OK')"

      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV81Final as entry; app=QApplication([]); w=entry.AuroraStudioV81Final(); assert entry.APP_VERSION=='0.8.1'; assert hasattr(w,'bulk_lrc_btn_v81'); assert 'Toplu Seç' in w.bulk_lrc_btn_v81.text(); assert hasattr(w,'batch_queue_v8'); w.close(); print('Aurora Studio Windows v0.8.1 UI OK')"

      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import AuroraStudioV4Entry `
            --hidden-import AuroraStudioV6Entry `
            --hidden-import AuroraStudioV6Final `
            --hidden-import AuroraStudioV7Final `
            --hidden-import AuroraStudioV8Final `
            --hidden-import win32timezone `
            pc/AuroraStudioV81Final.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.8.1.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.8.1.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.8.1.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.8.1.txt

      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.8.1
          path: yayin/*

      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.8.1 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows v0.8.1 release bulunmadı." }
          gh release create aurora-studio-v0.8.1 yayin/* `
            --title "Aurora Studio Windows v0.8.1" `
            --notes "Yeni Yayın ekranında albüm veya single için çoklu LRC dosyası seçimi. Türkçe karakterler ve parça numaraları normalize edilerek dosyalar önce şarkı adlarıyla eşleştirilir; eşleşmeyenler doğal dosya/albüm sırasına yerleştirilir. LRC zaman kodları doğrulanıp standartlaştırılır. v0.8.0 batch yayın, Spotify metadata, ses eşleştirme ve mevcut tekli LRC özellikleri korunmuştur."
