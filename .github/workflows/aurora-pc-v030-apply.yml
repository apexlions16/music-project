name: Aurora Studio Windows v0.3 Apply

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/pc-v030-*.patchpart"
      - ".github/workflows/aurora-pc-v030-apply.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-pc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Windows Studio v0.3 yamasını uygula
        run: |
          : > /tmp/aurora-pc-v030.patch
          for part in tools/pc-v030-*.patchpart; do
            tail -c +2 "$part" >> /tmp/aurora-pc-v030.patch
          done
          patch --batch --forward -p1 < /tmp/aurora-pc-v030.patch
          python -m py_compile pc/AuroraStudio.py
          grep -q 'APP_VERSION = "0.3.0"' pc/AuroraStudio.py
          grep -q 'def fetch_cover_to_hf' pc/AuroraStudio.py
          grep -q 'def make_curation_page' pc/AuroraStudio.py
          ! grep -q 'HF_HUB_DISABLE_XET' pc/AuroraStudio.py
      - name: Doğrulanan Windows kaynağını dala yaz
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pc/AuroraStudio.py
          if git diff --cached --quiet; then
            echo "Kaynak değişikliği yok."
          else
            git commit -m "Aurora Studio Windows v0.3.0"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
