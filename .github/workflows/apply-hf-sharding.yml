name: Aurora HF Shard Yamasını Uygula

on:
  pull_request:
    branches: [main]
    paths:
      - "HF_SHARD_TRIGGER.txt"
      - "tools/apply_hf_sharding_patch.py"
      - ".github/workflows/apply-hf-sharding.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-hf-shard-patch-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Dalı al
        uses: actions/checkout@v4
        with:
          ref: agent/hf-folder-sharding
          fetch-depth: 0

      - name: Tetik dosyasını kontrol et
        id: trigger
        shell: bash
        run: |
          if [ -f HF_SHARD_TRIGGER.txt ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Yama daha önce uygulanmış; işlem yapılmayacak."
          fi

      - name: Yamayı uygula ve Python sözdizimini doğrula
        if: steps.trigger.outputs.enabled == 'true'
        shell: bash
        run: |
          set +e
          rm -f HF_SHARD_PATCH.log
          python - <<'PY'
          from pathlib import Path
          path = Path("tools/apply_hf_sharding_patch.py")
          text = path.read_text(encoding="utf-8")
          old = "    new_storage,\n    source,"
          new = "    lambda _match: new_storage,\n    source,"
          if old not in text:
              raise SystemExit("re.sub ham yerleştirme satırı bulunamadı")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          {
            python tools/apply_hf_sharding_patch.py
            PATCH_CODE=$?
            if [ "$PATCH_CODE" -eq 0 ]; then
              python -m py_compile pc/AuroraStudio.py
              PATCH_CODE=$?
            fi
            if [ "$PATCH_CODE" -eq 0 ]; then grep -q 'APP_VERSION = "0.2.1"' pc/AuroraStudio.py; PATCH_CODE=$?; fi
            if [ "$PATCH_CODE" -eq 0 ]; then grep -q 'HF_SHARD_FILE_LIMIT = 9000' pc/AuroraStudio.py; PATCH_CODE=$?; fi
            if [ "$PATCH_CODE" -eq 0 ]; then grep -q 'HF_COMMIT_SOFT_LIMIT = 120' pc/AuroraStudio.py; PATCH_CODE=$?; fi
            if [ "$PATCH_CODE" -eq 0 ]; then grep -q 'allocate_remote("audio"' pc/AuroraStudio.py; PATCH_CODE=$?; fi
            echo "exit_code=$PATCH_CODE"
            exit "$PATCH_CODE"
          } 2>&1 | tee HF_SHARD_PATCH.log
          exit ${PIPESTATUS[0]}

      - name: Hata kaydını dala yaz
        if: failure() && steps.trigger.outputs.enabled == 'true'
        shell: bash
        run: |
          git restore tools/apply_hf_sharding_patch.py || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add HF_SHARD_PATCH.log
          git commit -m "HF shard yama hata kaydını güncelle" || true
          git push origin HEAD:agent/hf-folder-sharding || true

      - name: Değişiklikleri dala yaz
        if: success() && steps.trigger.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euxo pipefail
          git restore tools/apply_hf_sharding_patch.py
          rm -rf pc/__pycache__
          rm -f HF_SHARD_TRIGGER.txt HF_SHARD_PATCH.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git reset -- .github/workflows/apply-hf-sharding.yml tools/apply_hf_sharding_patch.py README-HF-SHARD-PR.txt dummy || true
          git status --short
          git commit -m "Aurora Studio HF shard ve yükleme koruması"
          git push origin HEAD:agent/hf-folder-sharding
