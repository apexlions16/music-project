name: Repair and Test Aurora v0.6

on:
  push:
    branches: [fix/aurora-v060-stability]
    paths:
      - .github/workflows/repair-and-test-v060.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aurora-v060-stability
          fetch-depth: 0
      - name: Kotlin regex kaçışlarını düzelt
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt')
          text = p.read_text(encoding='utf-8')
          text = text.replace(r'Regex("\s+")', r'Regex("\\s+")')
          text = text.replace(r'Regex("[\u0000-\u001F\u007F]+")', r'Regex("[\\p{Cc}]+")')
          p.write_text(text, encoding='utf-8')
          assert r'Regex("\\s+")' in text
          assert r'Regex("[\\p{Cc}]+")' in text
          PY
      - name: Düzeltmeyi kaydet
        run: |
          git config user.name "Aurora Stability Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          git commit -m "Studio Mobile Hugging Face commit doğrulayıcısını derlenebilir yap" || true
          git pull --rebase origin fix/aurora-v060-stability
          git push origin HEAD:fix/aurora-v060-stability

  android:
    needs: repair
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aurora-v060-stability
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Kaynak sözleşmeleri
        run: |
          ! grep -R "startForegroundService" app/src/main/kotlin/com/apexlions/music
          grep -q "appContext.startService" app/src/main/kotlin/com/apexlions/music/AuroraPlaybackService.kt
          grep -Fq 'Regex("\\s+")' studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -Fq 'Regex("[\\p{Cc}]+")' studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -q 'versionName = "0.6.0"' app/build.gradle.kts
          grep -q 'versionName = "0.5.0"' studioapp/build.gradle.kts
      - name: Android uygulamalarını derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug :studioapp:assembleDebug

  windows:
    needs: repair
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aurora-v060-stability
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Windows Studio doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py
          python -c "import sys; from pathlib import Path; sys.path.insert(0,'pc'); import AuroraStudio as b; r=b.ImportRequest(artist_id='a',release_artist_ids=['a'],release_title='T',release_type='single',release_date='2026-07-15',label='',copyright_text='',description='',cover_url='https://huggingface.co/x',cover_path=None,hero_url='',animated_cover_url='',tracks=[],featured=False); assert r.animated_cover_path is None; print('ImportRequest metadata-only OK')"
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV4Entry as entry; app=QApplication([]); w=entry.AuroraStudioV4(); assert entry.APP_VERSION=='0.5.0'; assert w.spotify_auto_lyrics.isEnabled() is False; w.close(); print('Windows Studio v0.5 smoke OK')"

  report:
    if: always()
    needs: [repair, android, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/aurora-v060-stability
          fetch-depth: 0
      - name: Sonucu kaydet
        run: |
          mkdir -p verification
          {
            echo "source_commit=$(git rev-parse HEAD)"
            echo "repair=${{ needs.repair.result }}"
            echo "android=${{ needs.android.result }}"
            echo "windows=${{ needs.windows.result }}"
            echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > verification/v060-build.txt
          git config user.name "Aurora Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/v060-build.txt
          git commit -m "Aurora v0.6 kararlılık derlemelerini doğrula" || true
          git pull --rebase origin fix/aurora-v060-stability
          git push origin HEAD:fix/aurora-v060-stability
      - name: Başarısız iş varsa durdur
        if: needs.android.result != 'success' || needs.windows.result != 'success'
        run: exit 1
