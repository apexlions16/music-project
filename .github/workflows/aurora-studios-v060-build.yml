name: Aurora Studios v0.6.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-studios-v060-build.yml"
  push:
    branches:
      - main
      - feature/aurora-upcoming-audio-matcher
    paths:
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-studios-v060-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-studios-v060-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio_mobile:
    name: Aurora Studio Mobile v0.6.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Studio Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Studio Mobile v0.6 sözleşmesi
        run: |
          grep -q 'versionName = "0.6.0"' studioapp/build.gradle.kts
          grep -q 'StudioAudioCompletionActivity' studioapp/src/main/AndroidManifest.xml
          grep -q 'StudioLibraryActivity' studioapp/src/main/AndroidManifest.xml
          grep -q 'object MediaMatcher' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MediaMatcher.kt
          grep -q 'attachAudioBatch' studioapp/src/main/kotlin/com/apexlions/aurorastudio/AudioCompletionManager.kt
          grep -q 'deleteTrackCompletely' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioLibraryManager.kt
          grep -q 'Yayın Kütüphanesi' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioHubActivity.kt
          grep -q 'bulkAudioPicker' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'Ses dosyalarını toplu seç ve eşleştir' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          ! grep -q 'Görsel Fetch' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.6.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.6.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile-v0.6.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.6.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.6.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.6.0 yayin/* \
            --title "Aurora Studio Mobile v0.6.0" \
            --notes "Birleşik Yayın Kütüphanesi; albüm/single ve şarkıları tek yerde düzenleme, yalnız yayından çıkarma veya tamamen silme. Yakında yayınlara yeni release oluşturmadan toplu ses ekleme; otomatik isim benzerliği, albüm sırası fallback ve elle eşleştirme. Yeni yayın ekranında da toplu ses seçimi. TXT/LRC toplu söz eşleştirme. Spotify kapağı yayın sırasında otomatik Hugging Face'e taşınır; hareketli kapak isteğe bağlıdır."

  studio_windows:
    name: Aurora Studio Windows v0.6.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıklar ve kaynak doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py
          if (-not (Select-String -Path pc/AuroraStudioV6Entry.py -Pattern 'APP_VERSION = "0.6.0"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV6Entry.py -Pattern 'Yayın Kütüphanesi' -Quiet)) { throw 'Birleşik yayın kütüphanesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV6Entry.py -Pattern 'match_media' -Quiet)) { throw 'Toplu isim eşleştirme eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV6Entry.py -Pattern 'submit_completion_v6' -Quiet)) { throw 'Yakında ses tamamlama eksik' }
      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV6Final as entry; app=QApplication([]); w=entry.AuroraStudioV6Final(); assert entry.APP_VERSION=='0.6.0'; assert w.nav.count()==8; assert w.pages.count()==8; assert w.cover_fetch_btn_v3.isHidden(); w.close(); print('Aurora Studio Windows v0.6 smoke test OK')"
      - name: Eşleştirme birim kontrolü
        shell: pwsh
        run: |
          python -c "import sys; sys.path.insert(0,'pc'); from pathlib import Path; from AuroraStudioV6Entry import match_media; r=match_media(['Birinci Şarkı','İkinci Şarkı'],[Path('02 - Ikinci Sarki.flac'),Path('01 Birinci Sarki (Official Audio).flac')]); assert r=={0:1,1:0},r; print('Media matching OK')"
      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe
      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import AuroraStudioV4Entry `
            --hidden-import AuroraStudioV6Entry `
            --hidden-import win32timezone `
            pc/AuroraStudioV6Final.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md
      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.6.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.6.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.6.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.6.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.6.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.6.0 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows release bulunmadı." }
          gh release create aurora-studio-v0.6.0 yayin/* `
            --title "Aurora Studio Windows v0.6.0" `
            --notes "Sade sekiz bölümlü navigasyon; birleşik Yayın Kütüphanesi; albüm ve şarkıyı tek yerde düzenleme veya silme. Yakında yayınlara yeni release oluşturmadan toplu ses/TXT/LRC ekleme; isim benzerliği, albüm sırası ve elle eşleştirme. Spotify kapağı Yayınla sırasında otomatik indirilip Hugging Face'e taşınır; Görsel Fetch düğmesi kaldırılmıştır."
