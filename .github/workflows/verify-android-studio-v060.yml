name: Verify Android Studio v0.6

on:
  push:
    branches:
      - feature/aurora-upcoming-audio-matcher
    paths:
      - ".github/workflows/verify-android-studio-v060.yml"
      - "studioapp/**"

permissions:
  contents: write

concurrency:
  group: verify-android-studio-v060
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-upcoming-audio-matcher
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: APK derleme sonucunu kaydet
        run: |
          set +e
          gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug > /tmp/studio-v060-build.log 2>&1
          code=$?
          mkdir -p verification
          if [ "$code" -eq 0 ]; then
            {
              echo "SUCCESS"
              echo "task=:studioapp:assembleDebug"
              echo "version=0.6.0"
              echo "bulk_audio_match=true"
              echo "library=true"
              echo "upcoming_completion=true"
            } > verification/android-studio-v060-build.txt
          else
            {
              echo "FAILURE"
              tail -n 180 /tmp/studio-v060-build.log
            } > verification/android-studio-v060-build.txt
          fi
          cat verification/android-studio-v060-build.txt
          git config user.name "Aurora Android Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/android-studio-v060-build.txt
          if ! git diff --cached --quiet; then
            git commit -m "Studio Mobile v0.6 Android derleme sonucunu kaydet"
            git push origin HEAD:feature/aurora-upcoming-audio-matcher
          fi
          exit "$code"
