name: Aurora Studio Windows v0.8.2 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "pc/**"
      - ".github/workflows/aurora-studio-windows-v082-build.yml"
  push:
    branches: [main]
    paths:
      - "pc/**"
      - ".github/workflows/aurora-studio-windows-v082-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-studio-windows-v082-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio_windows:
    name: Aurora Studio Windows v0.8.2
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıklar ve kaynak doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py pc/AuroraStudioV7Final.py pc/AuroraStudioV8Final.py pc/AuroraStudioV81Final.py pc/AuroraStudioV82Final.py
          if (-not (Select-String -Path pc/AuroraStudioV82Final.py -Pattern 'APP_VERSION = "0.8.2"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV82Final.py -Pattern 'Seçili Şarkının Normal Sözünü Bul' -Quiet)) { throw 'Seçili şarkı otomatik söz düğmesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV82Final.py -Pattern 'Albümde Eksik Normal Sözleri Toplu Bul' -Quiet)) { throw 'Toplu otomatik söz düğmesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV82Final.py -Pattern 'lrclib.net/api' -Quiet)) { throw 'Söz arama sağlayıcısı eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV82Final.py -Pattern 'not track.synced_lyrics.strip()' -Quiet)) { throw 'LRC koruma sözleşmesi eksik' }

      - name: Normal söz ayrıştırma ve eşleşme birim kontrolü
        shell: pwsh
        run: |
          python -c "import sys; sys.path.insert(0,'pc'); from AuroraStudioV82Final import LyricsLookupSpec, PlainLyricsLookupClient, plain_from_payload_v82, similarity_v82; plain,derived=plain_from_payload_v82({'plainLyrics':'Birinci satir\nIkinci satir'}); assert plain=='Birinci satir\nIkinci satir' and not derived; plain,derived=plain_from_payload_v82({'syncedLyrics':'[00:00.64] Birinci satir [00:04.40] Ikinci satir'}); assert plain.splitlines()==['Birinci satir','Ikinci satir'] and derived; assert similarity_v82('Ba\u015f\u0131m Belada','Basim Belada')==1.0; spec=LyricsLookupSpec(0,'Ba\u015f\u0131m Belada',('Sanatci',),'Album',180); client=PlainLyricsLookupClient(); payload={'trackName':'Basim Belada','artistName':'Sanatci','albumName':'Album','duration':180,'plainLyrics':'Deneme sozleri','instrumental':False}; client._get_json=lambda path,params: payload if path=='get' else []; match=client.lookup(spec); assert match and match.lyrics=='Deneme sozleri' and match.confidence>=0.64; print('Otomatik normal soz testi OK')"

      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV82Final as entry; app=QApplication([]); w=entry.AuroraStudioV82Final(); assert entry.APP_VERSION=='0.8.2'; assert hasattr(w,'find_plain_selected_btn_v82'); assert hasattr(w,'find_plain_missing_btn_v82'); assert 'Normal Sözünü Bul' in w.find_plain_selected_btn_v82.text(); assert hasattr(w,'bulk_lrc_btn_v81'); assert hasattr(w,'batch_queue_v8'); w.close(); print('Aurora Studio Windows v0.8.2 UI OK')"

      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import AuroraStudioV4Entry `
            --hidden-import AuroraStudioV6Entry `
            --hidden-import AuroraStudioV6Final `
            --hidden-import AuroraStudioV7Final `
            --hidden-import AuroraStudioV8Final `
            --hidden-import AuroraStudioV81Final `
            --hidden-import win32timezone `
            pc/AuroraStudioV82Final.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.8.2.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.8.2.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.8.2.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.8.2.txt

      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.8.2
          path: yayin/*

      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.8.2 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows v0.8.2 release bulunmadı." }
          gh release create aurora-studio-v0.8.2 yayin/* `
            --title "Aurora Studio Windows v0.8.2" `
            --notes "Yeni Yayın ekranında seçili şarkının veya albümdeki bütün eksik parçaların normal sözlerini otomatik bulma. LRC bulunan parçalar değiştirilmez. Arama sanatçı, şarkı, albüm ve süre bilgisiyle LRCLIB API üzerinden yapılır; yalnız güvenli eşleşmeler forma yazılır. Bulunan sözler yayınlamadan önce Detay / Feat / Söz ekranından kontrol edilebilir. v0.8.1 toplu LRC, v0.8 batch yayın, Spotify metadata ve ses eşleştirme özellikleri korunmuştur."
