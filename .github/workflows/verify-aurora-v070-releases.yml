name: Verify Aurora v0.7 Releases

on:
  workflow_run:
    workflows: ["Aurora v0.7.0 Build"]
    branches: [main]
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Derleme ve release sonucunu raporla
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          mkdir -p verification
          if [ "$CONCLUSION" != "success" ]; then
            {
              echo '# Aurora v0.7 final doğrulaması'
              echo
              echo 'FAILED'
              echo
              echo "Actions run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}"
              echo
              echo '```text'
              gh run view "$RUN_ID" --log-failed || true
              echo '```'
            } > verification/AURORA_V070_FINAL.md
          else
            for attempt in $(seq 1 30); do
              mobile=$(gh release view v0.7.0 --json assets --jq '.assets[].name' 2>/dev/null | grep -Fx 'Aurora-Music-Android-v0.7.0.apk' || true)
              studio=$(gh release view aurora-studio-mobile-v0.7.0 --json assets --jq '.assets[].name' 2>/dev/null | grep -Fx 'Aurora-Studio-Mobile-v0.7.0.apk' || true)
              windows=$(gh release view aurora-studio-v0.7.0 --json assets --jq '.assets[].name' 2>/dev/null | grep -Fx 'Aurora-Studio-Windows-x64-v0.7.0.zip' || true)
              if [ -n "$mobile" ] && [ -n "$studio" ] && [ -n "$windows" ]; then break; fi
              sleep 10
            done
            if [ -z "$mobile" ] || [ -z "$studio" ] || [ -z "$windows" ]; then
              printf '# Aurora v0.7 final doğrulaması\n\nFAILED\n\nDerleme başarılı fakat beklenen release dosyalarından biri bulunamadı.\n' > verification/AURORA_V070_FINAL.md
            else
              cat > verification/AURORA_V070_FINAL.md <<EOF
          # Aurora v0.7 final doğrulaması

          SUCCESS

          - Actions run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}
          - Aurora Music Android: Aurora-Music-Android-v0.7.0.apk
          - Aurora Studio Mobile: Aurora-Studio-Mobile-v0.7.0.apk
          - Aurora Studio Windows: Aurora-Studio-Windows-x64-v0.7.0.zip
          EOF
            fi
          fi
      - name: Raporu main dalına kaydet
        run: |
          git config user.name "Aurora Release Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/AURORA_V070_FINAL.md
          git commit -m "Aurora v0.7 final release sonucunu kaydet" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
