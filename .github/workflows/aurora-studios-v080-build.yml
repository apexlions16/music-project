name: Aurora Studios v0.8.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-studios-v080-build.yml"
  push:
    branches: [main]
    paths:
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-studios-v080-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-studios-v080-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio_mobile:
    name: Aurora Studio Mobile v0.8.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Studio Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Batch yayın sözleşmesi
        run: |
          grep -q 'versionName = "0.8.0"' studioapp/build.gradle.kts
          grep -q 'val batchQueue' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'Yayını batch kuyruğuna ekle' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'class CatalogBatchPublisher' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt
          test "$(grep -c 'hub.uploadAndCommit' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt)" -eq 1
          test "$(grep -c 'github.commitCatalog' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt)" -eq 1
          grep -q 'existingByIsrc' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt
      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.8.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.8.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile-v0.8.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.8.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.8.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.8.0 yayin/* \
            --title "Aurora Studio Mobile v0.8.0" \
            --notes "Yeni Yayın ekranında çoklu batch kuyruğu. Her yayın kendi kapak, ses, LRC ve metadata taslağıyla sıraya alınır. Kuyruk tek seferde işlendiğinde bütün medya dosyaları tek Hugging Face commit'inde ve bütün katalog değişiklikleri tek GitHub commit'inde gönderilir. Mevcut tekli yayın yükleme mantığı korunmuştur."

  studio_windows:
    name: Aurora Studio Windows v0.8.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıklar ve kaynak doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py pc/AuroraStudioV7Final.py pc/AuroraStudioV8Final.py
          if (-not (Select-String -Path pc/AuroraStudioV8Final.py -Pattern 'APP_VERSION = "0.8.0"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV8Final.py -Pattern 'batch_releases_v8' -Quiet)) { throw 'Batch kuyruğu eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV8Final.py -Pattern 'existing_by_isrc' -Quiet)) { throw 'Batch ortak ISRC haritası eksik' }
          $source = Get-Content pc/AuroraStudioV8Final.py -Raw
          $section = ($source -split '    def publish_batch_v8\(self\) -> None:')[1] -split '\n    def _batch_finished_v8'
          if (($section | Select-String -Pattern 'storage\.create_commit\(' -AllMatches).Matches.Count -ne 1) { throw 'Batch içinde tek HF commit sözleşmesi bozuldu' }
          if (($section | Select-String -Pattern 'github\.commit_catalog\(' -AllMatches).Matches.Count -ne 1) { throw 'Batch içinde tek GitHub commit sözleşmesi bozuldu' }
      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV8Final as entry; app=QApplication([]); w=entry.AuroraStudioV8Final(); assert entry.APP_VERSION=='0.8.0'; assert w.nav.count()==8; assert w.pages.count()==8; assert hasattr(w,'batch_queue_v8'); assert w.batch_queue_v8.count()==0; assert 'Batch' in w.batch_publish_btn_v8.text(); w.close(); print('Aurora Studio Windows v0.8 UI OK')"
      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe
      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import AuroraStudioV4Entry `
            --hidden-import AuroraStudioV6Entry `
            --hidden-import AuroraStudioV6Final `
            --hidden-import AuroraStudioV7Final `
            --hidden-import win32timezone `
            pc/AuroraStudioV8Final.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md
      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.8.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.8.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.8.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.8.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.8.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.8.0 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows v0.8.0 release bulunmadı." }
          gh release create aurora-studio-v0.8.0 yayin/* `
            --title "Aurora Studio Windows v0.8.0" `
            --notes "Yeni Yayın ekranının altında çoklu batch kuyruğu. Mevcut formdan sınırsız sayıda yayın taslağı eklenebilir. Bütün dönüştürülmüş sesler, masterlar, Atmos dosyaları ve kapaklar tek Hugging Face commit'inde; bütün yayın ve şarkı kayıtları tek GitHub katalog commit'inde gönderilir. Tekli yayın düğmesi ve mevcut yükleme davranışı korunmuştur."
