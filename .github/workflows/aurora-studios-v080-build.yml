name: Aurora Studio Mobile v0.8.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "studioapp/**"
  push:
    branches: [main]
    paths:
      - "studioapp/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-studio-mobile-v080-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio_mobile:
    name: Aurora Studio Mobile v0.8.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Studio Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Batch yayın sözleşmesi
        run: |
          grep -q 'versionName = "0.8.0"' studioapp/build.gradle.kts
          grep -q 'val batchQueue' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'Yayını batch kuyruğuna ekle' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'class CatalogBatchPublisher' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt
          test "$(grep -c 'hub.uploadAndCommit' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt)" -eq 1
          test "$(grep -c 'github.commitCatalog' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt)" -eq 1
          grep -q 'existingByIsrc' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogBatchPublisher.kt
      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.8.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.8.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile-v0.8.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.8.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.8.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.8.0 yayin/* \
            --title "Aurora Studio Mobile v0.8.0" \
            --notes "Yeni Yayın ekranında çoklu batch kuyruğu. Her yayın kendi kapak, ses, LRC ve metadata taslağıyla sıraya alınır. Kuyruk tek seferde işlendiğinde bütün medya dosyaları tek Hugging Face commit'inde ve bütün katalog değişiklikleri tek GitHub commit'inde gönderilir. Mevcut tekli yayın yükleme mantığı korunmuştur."
