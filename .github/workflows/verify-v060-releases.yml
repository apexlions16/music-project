name: Verify Aurora v0.6 Releases

on:
  push:
    branches: [main]
    paths: [.github/workflows/verify-v060-releases.yml]

permissions:
  actions: read
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Final workflow ve release dosyalarını bekle
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          mkdir -p release-status
          verify_asset() {
            local tag="$1"
            local asset="$2"
            for attempt in $(seq 1 80); do
              if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null | grep -Fxq "$asset"; then
                return 0
              fi
              sleep 15
            done
            return 1
          }

          music=missing
          mobile=missing
          windows=missing
          verify_asset "v0.6.0" "Aurora-Music-Android-v0.6.0.apk" && music=success
          verify_asset "aurora-studio-mobile-v0.5.0" "Aurora-Studio-Mobile-v0.5.0.apk" && mobile=success
          verify_asset "aurora-studio-v0.5.0" "Aurora-Studio-Windows-x64-v0.5.0.zip" && windows=success

          gh run list --repo "$GITHUB_REPOSITORY" --workflow aurora-final-v060-build.yml --limit 5 \
            --json databaseId,status,conclusion,headSha,event,createdAt,updatedAt,url \
            > release-status/aurora-v060-runs.json
          {
            echo "source_commit=$(git rev-parse HEAD)"
            echo "music_android=${music}"
            echo "studio_mobile=${mobile}"
            echo "studio_windows=${windows}"
            echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > release-status/aurora-v060.txt
      - name: Sonucu main dalına kaydet
        run: |
          git config user.name "Aurora Release Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add release-status/aurora-v060.txt release-status/aurora-v060-runs.json
          git commit -m "Aurora v0.6 final release dosyalarını doğrula"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Eksik release varsa başarısız yap
        run: |
          grep -q '^music_android=success$' release-status/aurora-v060.txt
          grep -q '^studio_mobile=success$' release-status/aurora-v060.txt
          grep -q '^studio_windows=success$' release-status/aurora-v060.txt
