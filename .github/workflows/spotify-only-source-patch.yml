name: Spotify Only Source Patch

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - "tools/spotify_only_source_patch.py"
      - ".github/workflows/spotify-only-source-patch.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0

      - name: Spotify-only kaynak metinlerini uygula
        run: python tools/spotify_only_source_patch.py

      - name: Değişiklikleri dala kaydet
        run: |
          if git diff --quiet; then
            echo "Kaynak zaten güncel."
            exit 0
          fi
          git config user.name "Aurora Source Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt \
                  studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          git commit -m "Studio Mobile arayüzünü Spotify-only yap"
          git push origin HEAD:agent/aurora-studios-v030
