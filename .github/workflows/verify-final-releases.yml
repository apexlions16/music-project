name: Verify Aurora Final Releases

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/verify-final-releases.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Üç final release'i bekle ve doğrula
        id: releases
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          verify_release() {
            local tag="$1"
            local asset="$2"
            local attempt
            for attempt in $(seq 1 60); do
              if gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' 2>/dev/null | grep -Fxq "$asset"; then
                echo "$tag=$asset bulundu"
                return 0
              fi
              sleep 15
            done
            echo "$tag=$asset bulunamadı"
            return 1
          }

          music=missing
          mobile=missing
          windows=missing
          verify_release "v0.5.0" "Aurora-Music-Android-v0.5.0.apk" && music=success
          verify_release "aurora-studio-mobile-v0.4.0" "Aurora-Studio-Mobile-v0.4.0.apk" && mobile=success
          verify_release "aurora-studio-v0.4.0" "Aurora-Studio-Windows-x64-v0.4.0.zip" && windows=success

          mkdir -p release-status
          {
            echo "source_commit=${GITHUB_SHA}"
            echo "music_android=${music}"
            echo "studio_mobile=${mobile}"
            echo "studio_windows=${windows}"
            echo "verified_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > release-status/aurora-final-v050.txt
          if [ "$music" = success ] && [ "$mobile" = success ] && [ "$windows" = success ]; then
            echo "all_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_success=false" >> "$GITHUB_OUTPUT"
          fi
          exit 0
      - name: Sonucu main dalına kaydet
        run: |
          git config user.name "Aurora Release Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add release-status/aurora-final-v050.txt
          git commit -m "Aurora final release dosyalarını doğrula"
          git pull --rebase origin main
          git push origin HEAD:main
      - name: Eksik release varsa işi başarısız yap
        if: steps.releases.outputs.all_success != 'true'
        run: exit 1
