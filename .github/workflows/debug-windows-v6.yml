name: Debug Windows v0.6 UI

on:
  push:
    branches:
      - feature/aurora-upcoming-audio-matcher
    paths:
      - ".github/workflows/debug-windows-v6.yml"
      - "tools/debug_windows_v6.py"
      - "pc/AuroraStudioV6Final.py"

permissions:
  contents: write

concurrency:
  group: debug-windows-v060
  cancel-in-progress: true

jobs:
  debug:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-upcoming-audio-matcher
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sessiz bağımlılık kurulumu
        shell: pwsh
        run: |
          pip install -q -r pc/requirements.txt *> $null
      - name: UI başlangıç sonucunu yaz
        shell: pwsh
        run: python tools/debug_windows_v6.py
      - name: Sonucu dala kaydet
        shell: pwsh
        run: |
          git config user.name "Aurora Debug Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/windows-v6-debug.txt
          if (git diff --cached --quiet) { Write-Host "Debug sonucu değişmedi"; exit 0 }
          git commit -m "Windows v0.6 UI debug sonucunu kaydet"
          git pull --rebase origin feature/aurora-upcoming-audio-matcher
          git push origin HEAD:feature/aurora-upcoming-audio-matcher
