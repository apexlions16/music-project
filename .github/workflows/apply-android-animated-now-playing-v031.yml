name: Android v0.3.1 Animated Now Playing Patch

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/apply_android_animated_now_playing_v031.py"
      - ".github/workflows/apply-android-animated-now-playing-v031.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-animated-now-playing-v031
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/android-animated-now-playing-v031
          fetch-depth: 0

      - name: Android hareketli oynatma yamasını uygula
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_android_animated_now_playing_v031.py
          grep -q 'versionName = "0.3.1"' app/build.gradle.kts
          grep -q 'media3-ui:1.10.1' app/build.gradle.kts
          grep -q 'AnimatedNowPlayingArtwork' app/src/main/kotlin/com/apexlions/music/MainActivity.kt
          grep -q 'animatedCoverUrl.orEmpty()' app/src/main/kotlin/com/apexlions/music/MainActivity.kt
          grep -q 'Authorization.*Bearer' app/src/main/kotlin/com/apexlions/music/MainActivity.kt

      - name: Android kaynaklarını dala yaz
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts app/src/main/kotlin/com/apexlions/music/MainActivity.kt
          git commit -m "Android v0.3.1 hareketli oynatma ekranı"
          git push origin HEAD:agent/android-animated-now-playing-v031
