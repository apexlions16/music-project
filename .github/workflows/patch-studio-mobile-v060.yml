name: Patch Studio Mobile v0.6

on:
  push:
    branches:
      - feature/aurora-upcoming-audio-matcher
    paths:
      - "tools/patch_studio_mobile_v060.py"
      - ".github/workflows/patch-studio-mobile-v060.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-upcoming-audio-matcher
          fetch-depth: 0
      - name: Studio Mobile v0.6 kaynağını güncelle
        run: python tools/patch_studio_mobile_v060.py
      - name: Değişikliği dala kaydet
        run: |
          if git diff --quiet; then
            echo "Kaynak zaten güncel."
            exit 0
          fi
          git config user.name "Aurora Studio Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          git commit -m "Studio Mobile yeni yayında toplu ses eşleştirmeyi ekle"
          git push origin HEAD:feature/aurora-upcoming-audio-matcher
