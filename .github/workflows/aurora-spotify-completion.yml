name: Aurora Spotify Completion

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/aurora_spotify_completion.py"
      - "studioapp/**"
      - ".github/workflows/aurora-spotify-completion.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Spotify kaynak yamasını uygula
        run: python tools/aurora_spotify_completion.py
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Studio Mobile derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Doğrulanan kaynakları dala yaz
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add studioapp
          if git diff --cached --quiet; then
            echo "Kaynak değişikliği yok."
          else
            git commit -m "Studio Mobile v0.2.1 Spotify metadata tamamlama"
            git push origin "HEAD:${{ github.head_ref }}"
          fi
