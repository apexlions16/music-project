name: CI Tanılama

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/ci-tani.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  tani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: En son Android çalışmasını ve logunu al
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          HEADER=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")

          curl -fsSL "${HEADER[@]}" "${API}/actions/runs?per_page=50" -o /tmp/runs.json

          python - <<'PY'
          import json
          data = json.load(open('/tmp/runs.json', encoding='utf-8'))
          rows = []
          android_runs = []
          for run in data.get('workflow_runs', []):
              row = {
                  'id': run.get('id'), 'name': run.get('name'), 'event': run.get('event'),
                  'status': run.get('status'), 'conclusion': run.get('conclusion'),
                  'head_sha': run.get('head_sha'), 'created_at': run.get('created_at'),
                  'updated_at': run.get('updated_at'), 'html_url': run.get('html_url')
              }
              rows.append(row)
              if run.get('name') == 'Android APK Üret ve Yayınla':
                  android_runs.append(row)
          with open('ACTIONS_DURUM.json', 'w', encoding='utf-8') as f:
              json.dump(rows, f, ensure_ascii=False, indent=2); f.write('\n')
          if not android_runs:
              raise SystemExit('Android workflow çalışması bulunamadı')
          latest = android_runs[0]
          open('/tmp/run_id', 'w').write(str(latest['id']))
          with open('SON_DERLEME.json', 'w', encoding='utf-8') as f:
              json.dump(latest, f, ensure_ascii=False, indent=2); f.write('\n')
          PY

          RUN_ID=$(cat /tmp/run_id)
          curl -fsSL "${HEADER[@]}" "${API}/actions/runs/${RUN_ID}/jobs?filter=latest&per_page=100" -o /tmp/jobs.json
          python - <<'PY'
          import json
          data = json.load(open('/tmp/jobs.json', encoding='utf-8'))
          jobs = data.get('jobs', [])
          if not jobs:
              raise SystemExit('Workflow job bulunamadı')
          open('/tmp/job_id', 'w').write(str(jobs[0]['id']))
          with open('SON_DERLEME_ADIMLARI.json', 'w', encoding='utf-8') as f:
              json.dump(jobs[0], f, ensure_ascii=False, indent=2); f.write('\n')
          PY

          JOB_ID=$(cat /tmp/job_id)
          curl -fsSL "${HEADER[@]}" "${API}/actions/jobs/${JOB_ID}/logs" -o /tmp/job-log || true
          if [ -s /tmp/job-log ]; then
            if file /tmp/job-log | grep -qi zip; then
              unzip -p /tmp/job-log | tail -n 1000 > SON_BUILD_LOG.txt
            else
              tail -n 1000 /tmp/job-log > SON_BUILD_LOG.txt
            fi
          else
            echo "Son işin logu henüz indirilemedi; çalışma devam ediyor olabilir." > SON_BUILD_LOG.txt
          fi

      - name: Tanılama sonuçlarını kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ACTIONS_DURUM.json SON_DERLEME.json SON_DERLEME_ADIMLARI.json SON_BUILD_LOG.txt
          git commit -m "En son Android derleme tanısını kaydet [skip ci]" || true
          git push origin HEAD:main
