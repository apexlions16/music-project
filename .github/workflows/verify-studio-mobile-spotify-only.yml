name: Verify Studio Mobile Spotify Only

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/verify-studio-mobile-spotify-only.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android 36 paketleri
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Spotify-only kaynak denetimi
        run: |
          ! grep -q 'MusicBrainz + CAA' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          ! grep -q 'musicbrainz.org' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          ! grep -q 'coverartarchive.org' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          ! grep -q 'lrclib.net' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          grep -q 'Yalnızca Spotify' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'allArtistIds' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt

      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug

      - name: Başarı kaydını dala yaz
        run: |
          cat > studioapp/FINAL_SPOTIFY_ONLY_VERIFIED.md <<EOF
          # Studio Mobile Spotify-only doğrulaması

          - Sonuç: Başarılı
          - APK görevi: \`:studioapp:assembleDebug\`
          - Kaynak commit: \`${GITHUB_SHA}\`
          - Metadata kaynağı: Yalnızca Spotify Web API
          - Spotify dışı görsel URL'leri: Yayın sırasında Hugging Face'e taşınır
          - Şarkı sözleri: Spotify sağlamadığı için otomatik uydurulmaz
          EOF
          git config user.name "Aurora Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp/FINAL_SPOTIFY_ONLY_VERIFIED.md
          git commit -m "Studio Mobile Spotify-only derlemesini doğrula"
          git push origin HEAD:agent/aurora-studios-v030
