name: Aurora v0.7.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-v070-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - ".github/workflows/aurora-v070-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v070-${{ github.ref }}
  cancel-in-progress: true

jobs:
  music_android:
    name: Aurora Music Android v0.7.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Senkron LRC sözleşmesi
        run: |
          grep -q 'versionName = "0.7.0"' app/build.gradle.kts
          grep -q 'object LrcParser' app/src/main/kotlin/com/apexlions/music/LrcParser.kt
          grep -q 'SyncedLyricsPane' app/src/main/kotlin/com/apexlions/music/AuroraV4Activity.kt
          grep -q 'animateScrollToItem' app/src/main/kotlin/com/apexlions/music/SyncedLyricsPane.kt
          grep -q 'onSeek(line.timeMs)' app/src/main/kotlin/com/apexlions/music/SyncedLyricsPane.kt
      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.7.0.apk
          sha256sum yayin/Aurora-Music-Android-v0.7.0.apk > yayin/SHA256SUMS-Aurora-Music-v0.7.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.7.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.7.0 --cleanup-tag --yes || true
          gh release create v0.7.0 yayin/* \
            --title "Aurora Music Android v0.7.0" \
            --notes "Apple Music tarzı senkronize sözler: aktif satır otomatik ortalanır, geçmiş ve gelecek satırlar kısılır, satıra dokununca şarkı o zaman koduna gider. LRC ayrıştırıcısı zaman damgasından sonraki boşlukları ve tek satıra birleşmiş zaman kodlarını destekler."

  studio_mobile:
    name: Aurora Studio Mobile v0.7.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Studio Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Windows eşitliği ve LRC sözleşmesi
        run: |
          grep -q 'versionName = "0.7.0"' studioapp/build.gradle.kts
          grep -q 'StudioAdminActivity' studioapp/src/main/AndroidManifest.xml
          grep -q 'Genel Bakış' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioHubActivity.kt
          grep -q 'Katalog JSON' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioHubActivity.kt
          grep -q 'Şarkı, ISRC, sanatçı veya yayın ara' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioLibraryActivity.kt
          grep -q 'LRC Dosyası Seç ve Doğrula' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioLibraryActivity.kt
          grep -q 'fun allTracks' studioapp/src/main/kotlin/com/apexlions/aurorastudio/AudioCompletionManager.kt
          grep -q 'StudioLrcSupport.normalize' studioapp/src/main/kotlin/com/apexlions/aurorastudio/AudioCompletionManager.kt
      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.7.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.7.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile-v0.7.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.7.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.7.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.7.0 yayin/* \
            --title "Aurora Studio Mobile v0.7.0" \
            --notes "Windows Studio ile eşlenik sekiz yönetim alanı; Genel Bakış, Yeni Yayın, Yayın Kütüphanesi, Yakında Tamamlama, Sanatçılar, Sunum ve Listeler, Katalog JSON ve Ayarlar. Kütüphanede şarkı/ISRC/sanatçı/yayın arama. Yeni yayın ve mevcut şarkılarda dosyadan LRC seçme; toplu LRC modu bütün şarkıları gösterir ve zaman kodlarını doğrular."

  studio_windows:
    name: Aurora Studio Windows v0.7.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıklar ve kaynak doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py pc/AuroraStudioV7Final.py
          if (-not (Select-String -Path pc/AuroraStudioV7Final.py -Pattern 'APP_VERSION = "0.7.0"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV7Final.py -Pattern 'library_search_v7' -Quiet)) { throw 'Hızlı şarkı arama eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV7Final.py -Pattern 'normalize_lrc_v7' -Quiet)) { throw 'LRC doğrulama eksik' }
      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV7Final as entry; app=QApplication([]); w=entry.AuroraStudioV7Final(); assert entry.APP_VERSION=='0.7.0'; assert w.nav.count()==8; assert w.pages.count()==8; assert w.library_search_v7.placeholderText(); assert w.lrc_picker_v7.text(); w.close(); print('Aurora Studio Windows v0.7 UI OK')"
      - name: LRC ve arama birim kontrolü
        shell: pwsh
        run: |
          python -c "import sys; sys.path.insert(0,'pc'); from AuroraStudioV7Final import normalize_lrc_v7; raw='[00:00.64] Başım girer boyumdan büyük belalara [00:04.40]Yerim pusular düşüp tenhalara'; out=normalize_lrc_v7(raw); assert out.splitlines()==['[00:00.64]Başım girer boyumdan büyük belalara','[00:04.40]Yerim pusular düşüp tenhalara'],out; print('LRC normalization OK')"
      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe
      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import AuroraStudioV4Entry `
            --hidden-import AuroraStudioV6Entry `
            --hidden-import AuroraStudioV6Final `
            --hidden-import win32timezone `
            pc/AuroraStudioV7Final.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md
      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.7.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.7.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.7.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.7.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.7.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.7.0 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows release bulunmadı." }
          gh release create aurora-studio-v0.7.0 yayin/* `
            --title "Aurora Studio Windows v0.7.0" `
            --notes "Yayın Kütüphanesi içinde anlık şarkı, ISRC, sanatçı ve yayın arama; Ctrl+F kısayolu. Mevcut şarkıya dosyadan LRC yükleme ve doğrulama. Toplu LRC/TXT modunda bütün şarkıları listeleme; boşluklu veya tek satıra birleşmiş zaman damgalarını standart LRC satırlarına dönüştürme."
