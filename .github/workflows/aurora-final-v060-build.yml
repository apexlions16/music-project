name: Aurora Music Android v0.6.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "settings.gradle.kts"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "settings.gradle.kts"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-music-v060-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_music:
    name: Aurora Music Android v0.6.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Arka plan kararlılık sözleşmesi
        run: |
          grep -q 'versionName = "0.6.0"' app/build.gradle.kts
          grep -q 'MediaSessionService' app/src/main/kotlin/com/apexlions/music/AuroraPlaybackService.kt
          grep -q 'appContext.startService' app/src/main/kotlin/com/apexlions/music/AuroraPlaybackService.kt
          ! grep -R -q 'startForegroundService' app/src/main/kotlin/com/apexlions/music
          grep -q 'FOREGROUND_SERVICE_MEDIA_PLAYBACK' app/src/main/AndroidManifest.xml
          grep -q 'POST_NOTIFICATIONS' app/src/main/AndroidManifest.xml
          grep -q 'recordPlaybackFailure' app/src/main/kotlin/com/apexlions/music/PlayerController.kt
      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.6.0.apk
          sha256sum yayin/Aurora-Music-Android-v0.6.0.apk > yayin/SHA256SUMS-Aurora-Music-v0.6.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.6.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.6.0 --cleanup-tag --yes || true
          gh release create v0.6.0 yayin/* \
            --title "Aurora Music Android v0.6.0" \
            --notes "Arka plan geçişinden sonra oluşan foreground-service zaman aşımı kaldırıldı. MediaSessionService güvenli ve idempotent başlatılır; oynatılabilir kaynak doğrulanmadan servis açılmaz. Oynatma, toggle ve kuyruk yenileme hataları uygulama sürecini düşürmek yerine kullanıcıya bildirilir. Sistem medya bildirimi, kilit ekranı ve bağlı cihaz kontrolleri korunur. Hareketli kapak varsa video, yoksa standart kapak gösterilir."
