name: Aurora Final v0.6 / Studio v0.5

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-final-v060-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-final-v060-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-final-v060-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_music:
    name: Aurora Music Android v0.6.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Arka plan kararlılık sözleşmesi
        run: |
          grep -q 'versionName = "0.6.0"' app/build.gradle.kts
          grep -q 'MediaSessionService' app/src/main/kotlin/com/apexlions/music/AuroraPlaybackService.kt
          grep -q 'appContext.startService' app/src/main/kotlin/com/apexlions/music/AuroraPlaybackService.kt
          ! grep -R -q 'startForegroundService' app/src/main/kotlin/com/apexlions/music
          grep -q 'FOREGROUND_SERVICE_MEDIA_PLAYBACK' app/src/main/AndroidManifest.xml
          grep -q 'POST_NOTIFICATIONS' app/src/main/AndroidManifest.xml
          grep -q 'recordPlaybackFailure' app/src/main/kotlin/com/apexlions/music/PlayerController.kt
      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.6.0.apk
          sha256sum yayin/Aurora-Music-Android-v0.6.0.apk > yayin/SHA256SUMS-Aurora-Music-v0.6.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.6.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.6.0 --cleanup-tag --yes || true
          gh release create v0.6.0 yayin/* \
            --title "Aurora Music Android v0.6.0" \
            --notes "Arka plan geçişinden sonra oluşan foreground-service zaman aşımı kaldırıldı. MediaSessionService güvenli ve idempotent başlatılır; oynatılabilir kaynak doğrulanmadan servis açılmaz. Oynatma, toggle ve kuyruk yenileme hataları uygulama sürecini düşürmek yerine kullanıcıya bildirilir. Sistem medya bildirimi, kilit ekranı ve bağlı cihaz kontrolleri korunur. Hareketli kapak varsa video, yoksa standart kapak gösterilir."

  android_studio:
    name: Aurora Studio Mobile v0.5.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Kalıcı Android imzası
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1
      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Studio Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Metadata-only ve Hugging Face sözleşmesi
        run: |
          grep -q 'versionName = "0.5.0"' studioapp/build.gradle.kts
          grep -q 'normalizedCommitSummary' studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -q 'getString("summary")' studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -q "Yüklenecek medya yok; Hugging Face commit'i atlandı" studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -q 'value.summary' studioapp/src/main/kotlin/com/apexlions/aurorastudio/HubClients.kt
          grep -q 'waiting_for_audio' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogV2Manager.kt
          grep -q 'animatedCoverUrl' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogV2Manager.kt
          ! grep -q 'musicbrainz.org' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          ! grep -q 'coverartarchive.org' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
          ! grep -q 'lrclib.net' studioapp/src/main/kotlin/com/apexlions/aurorastudio/MetadataClients.kt
      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.5.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.5.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile-v0.5.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.5.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.5.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.5.0 yayin/* \
            --title "Aurora Studio Mobile v0.5.0" \
            --notes "Hugging Face NDJSON commit başlığı gönderilmeden önce doğrulanır; value.summary protokol hatasında sınırlı güvenli retry uygulanır. Medya bulunmayan metadata-only yayınlarda Hugging Face commit'i atlanır ve GitHub kataloğu Yakında olarak commit edilir. Hareketli kapak URL'si isteğe bağlıdır; boşsa normal kapak kullanılır. Spotify-only metadata akışı korunur."

  windows_studio:
    name: Aurora Studio Windows v0.5.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıklar ve ImportRequest testi
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py
          if (-not (Select-String -Path pc/AuroraStudioV4Entry.py -Pattern 'APP_VERSION = "0.5.0"' -Quiet)) { throw 'Windows Studio sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudio.py -Pattern 'animated_cover_path: Path \| None = None' -Quiet)) { throw 'animated_cover_path şeması eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV3.py -Pattern 'animated_cover_url=self.animated_url_v3' -Quiet)) { throw 'Hareketli URL request alanı eksik' }
          python -c "import sys; sys.path.insert(0,'pc'); import AuroraStudio as b; r=b.ImportRequest(artist_id='a',release_artist_ids=['a'],release_title='T',release_type='single',release_date='2026-07-15',label='',copyright_text='',description='',cover_url='https://huggingface.co/x',cover_path=None,hero_url='',animated_cover_url='',tracks=[],featured=False); assert r.animated_cover_path is None; print('ImportRequest metadata-only OK')"
      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV4Entry as entry; app=QApplication([]); w=entry.AuroraStudioV4(); assert entry.APP_VERSION=='0.5.0'; assert w.spotify_auto_lyrics.isEnabled() is False; w.close(); print('Aurora Studio Windows v0.5 smoke test OK')"
      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe
      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import AuroraStudioV3Entry `
            --hidden-import win32timezone `
            pc/AuroraStudioV4Entry.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md
      - name: Paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.5.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.5.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.5.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio-Windows-v0.5.0.txt
      - uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.5.0
          path: yayin/*
      - name: GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.5.0 --cleanup-tag --yes 2>$null
          if ($LASTEXITCODE -ne 0) { Write-Host "Önceki Windows release bulunmadı." }
          gh release create aurora-studio-v0.5.0 yayin/* `
            --title "Aurora Studio Windows v0.5.0" `
            --notes "ImportRequest şeması hareketli kapak URL ve isteğe bağlı yerel video yoluyla eşitlendi. animated_cover_path parametre hatası kaldırıldı. Ses dosyası olmayan metadata-only yayınlar Hugging Face media commit'i olmadan GitHub kataloğuna Yakında olarak yazılır. Normal kapak zorunlu temel görseldir; hareketli medya isteğe bağlıdır."
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
