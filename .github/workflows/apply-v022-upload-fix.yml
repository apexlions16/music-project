name: Aurora Studio v0.2.2 Upload Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/apply_v022_upload_fix.py"
      - ".github/workflows/apply-v022-upload-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v022-upload-fix
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hf-real-progress-v022
          fetch-depth: 0

      - name: Yalnızca Xet yükleme düzeltmesini uygula
        run: |
          set -euo pipefail
          python tools/apply_v022_upload_fix.py
          python -m py_compile pc/AuroraStudio.py
          grep -q 'APP_VERSION = "0.2.2"' pc/AuroraStudio.py
          grep -q 'preupload_lfs_files' pc/AuroraStudio.py
          grep -q 'Xet ile yükleniyor' pc/AuroraStudio.py
          grep -q 'HF_SHARD_FILE_LIMIT = 9000' pc/AuroraStudio.py
          grep -q 'HF_COMMIT_SOFT_LIMIT = 120' pc/AuroraStudio.py
          if grep -q 'HF_HUB_DISABLE_XET' pc/AuroraStudio.py; then
            echo "Xet'i kapatan ayar hâlâ mevcut"
            exit 1
          fi

      - name: Kaynakları dala yaz
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pc/AuroraStudio.py pc/README.md
          git commit -m "Aurora Studio v0.2.2 Xet yükleme göstergesini düzelt"
          git push origin HEAD:agent/hf-real-progress-v022
