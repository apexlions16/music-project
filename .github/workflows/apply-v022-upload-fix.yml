name: Aurora Studio v0.2.2 Upload Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/apply_v022_upload_fix.py"
      - ".github/workflows/apply-v022-upload-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v022-upload-fix
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hf-real-progress-v022
          fetch-depth: 0

      - name: Yükleme düzeltmesini uygula
        shell: bash
        run: |
          set +e
          {
            set -x
            python - <<'PY'
            from pathlib import Path
            path = Path('tools/apply_v022_upload_fix.py')
            text = path.read_text(encoding='utf-8')
            text = text.replace(
                "old_main = '''if __name__ == \"__main__\":\n    main()\n'''",
                "old_main = '''if __name__ == \"__main__\":\n    raise SystemExit(main())\n'''",
                1,
            )
            text = text.replace(
                "    main()\n'''\nif old_main not in source:",
                "    raise SystemExit(main())\n'''\nif old_main not in source:",
                1,
            )
            path.write_text(text, encoding='utf-8')
            PY
            python tools/apply_v022_upload_fix.py
            CODE=$?
            if [ "$CODE" -eq 0 ]; then python -m py_compile pc/AuroraStudio.py; CODE=$?; fi
            if [ "$CODE" -eq 0 ]; then grep -q 'APP_VERSION = "0.2.2"' pc/AuroraStudio.py; CODE=$?; fi
            if [ "$CODE" -eq 0 ]; then grep -q 'def _hf_upload_process_worker' pc/AuroraStudio.py; CODE=$?; fi
            if [ "$CODE" -eq 0 ]; then grep -q 'preupload_lfs_files' pc/AuroraStudio.py; CODE=$?; fi
            if [ "$CODE" -eq 0 ]; then grep -q 'multiprocessing.freeze_support' pc/AuroraStudio.py; CODE=$?; fi
            if [ "$CODE" -eq 0 ]; then grep -q 'Callable\[\[str, int\]' pc/AuroraStudio.py; CODE=$?; fi
            exit "$CODE"
          } 2>&1 | tee V022_PATCH.log
          exit ${PIPESTATUS[0]}

      - name: Yama logu
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-v022-patch-log-${{ github.run_id }}
          path: V022_PATCH.log
          if-no-files-found: warn

      - name: Kaynakları dala yaz
        run: |
          set -euo pipefail
          git restore tools/apply_v022_upload_fix.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pc/AuroraStudio.py pc/README.md
          git commit -m "Aurora Studio v0.2.2 gerçek yükleme görünürlüğü"
          git push origin HEAD:agent/hf-real-progress-v022
