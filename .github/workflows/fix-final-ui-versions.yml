name: Fix Final Studio UI Versions

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/fix-final-ui-versions.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: Görünen sürümleri v0.4.0 yap
        run: |
          sed -i 's/v0\.3\.0 •/v0.4.0 •/g' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          sed -i 's/Mobile v0\.3\.0/Mobile v0.4.0/g' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioHubActivity.kt
          sed -i 's/Studio Mobile v0\.3\.0/Studio Mobile v0.4.0/g' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioCurationActivity.kt
          sed -i 's/AuroraStudioMobile\/0\.3\.0/AuroraStudioMobile\/0.4.0/g' studioapp/src/main/kotlin/com/apexlions/aurorastudio/CatalogV2Manager.kt
          grep -q 'v0.4.0 •' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          grep -q 'Mobile v0.4.0' studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioHubActivity.kt
      - name: Android derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug
      - name: Kaydet
        run: |
          git config user.name "Aurora UI Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp
          git commit -m "Studio Mobile görünen sürümünü v0.4.0 yap"
          git pull --rebase origin agent/aurora-studios-v030
          git push origin HEAD:agent/aurora-studios-v030
