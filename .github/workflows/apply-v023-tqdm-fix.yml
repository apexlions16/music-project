name: Aurora Studio v0.2.3 TQDM Fix

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/apply_v023_tqdm_fix.py"
      - ".github/workflows/apply-v023-tqdm-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v023-tqdm-fix
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/hf-tqdm-fix-v023
          fetch-depth: 0

      - name: Yalnızca tqdm yükleme hatasını düzelt
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_v023_tqdm_fix.py
          python -m py_compile pc/AuroraStudio.py
          grep -q 'APP_VERSION = "0.2.3"' pc/AuroraStudio.py
          grep -q 'HF_HUB_DISABLE_PROGRESS_BARS", "1"' pc/AuroraStudio.py
          if grep -q 'HF_HUB_DISABLE_XET' pc/AuroraStudio.py; then
            echo "Xet kapatma ayarı bulundu; işlem durduruluyor."
            exit 1
          fi

      - name: Kaynağı dala yaz
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pc/AuroraStudio.py
          git commit -m "Aurora Studio v0.2.3 windowed tqdm düzeltmesi"
          git push origin HEAD:agent/hf-tqdm-fix-v023
