name: Report Aurora v0.7 Run

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/report-v070-run.yml"

permissions:
  actions: read
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: v0.7 workflow sonucunu bekle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p verification
          run_id=""
          for attempt in $(seq 1 60); do
            run_id=$(gh run list --workflow aurora-v070-build.yml --branch main --limit 1 --json databaseId --jq '.[0].databaseId // empty')
            status=$(gh run list --workflow aurora-v070-build.yml --branch main --limit 1 --json status --jq '.[0].status // empty')
            if [ -n "$run_id" ] && [ "$status" = "completed" ]; then break; fi
            sleep 15
          done
          if [ -z "$run_id" ]; then
            printf '# Aurora v0.7 Actions raporu\n\nFAILED\n\nWorkflow run bulunamadı.\n' > verification/AURORA_V070_RUN.md
          else
            conclusion=$(gh run view "$run_id" --json conclusion --jq '.conclusion')
            {
              echo '# Aurora v0.7 Actions raporu'
              echo
              echo "run_id=$run_id"
              echo "status=completed"
              echo "conclusion=$conclusion"
              echo "url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/$run_id"
              if [ "$conclusion" != "success" ]; then
                echo
                echo '```text'
                gh run view "$run_id" --log-failed || true
                echo '```'
              fi
            } > verification/AURORA_V070_RUN.md
          fi
      - name: Raporu kaydet
        run: |
          git config user.name "Aurora Run Reporter"
          git config user.email "actions@users.noreply.github.com"
          git add verification/AURORA_V070_RUN.md
          git commit -m "Aurora v0.7 Actions sonucunu kaydet" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
