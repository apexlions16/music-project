name: Apply Studio Batch v0.8.0

on:
  push:
    branches: [feature/studio-batch-releases-v080]
    paths:
      - "tools/apply_studio_batch_v080.py"
      - ".github/workflows/apply-studio-batch-v080.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/studio-batch-releases-v080
          fetch-depth: 0
      - name: Studio Mobile kaynağını güncelle
        run: python tools/apply_studio_batch_v080.py
      - name: Değişiklikleri dala kaydet
        run: |
          if git diff --quiet; then
            echo "Kaynak zaten güncel."
            exit 0
          fi
          git config user.name "Aurora Batch Bot"
          git config user.email "actions@users.noreply.github.com"
          git add studioapp/src/main/kotlin/com/apexlions/aurorastudio/StudioV2Activity.kt
          git commit -m "Studio Mobile'a çoklu yayın batch kuyruğu ekle"
          git push origin HEAD:feature/studio-batch-releases-v080
