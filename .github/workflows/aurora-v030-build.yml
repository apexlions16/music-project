name: Aurora Music 0.3.2 / Studio Mobile 0.1.0 / Studio Windows 0.2.3 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "catalog/schema.json"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-v030-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "catalog/schema.json"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-v030-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_music:
    name: Aurora Music Android v0.3.2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android 36 paketleri
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug

      - name: Aurora Music paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.3.2.apk
          sha256sum yayin/Aurora-Music-Android-v0.3.2.apk > yayin/SHA256SUMS-Aurora-Music.txt

      - name: Aurora Music artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.3.2
          path: yayin/*

      - name: Aurora Music Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.3.2 --cleanup-tag --yes || true
          gh release create v0.3.2 yayin/* \
            --title "Aurora Music Android v0.3.2" \
            --notes "Hareketli kapak videosu artık oynatma ekranının tamamını karartılmış arka plan olarak kaplar. Serbest feat isimleri ve Explicit E rozeti desteklenir. Gated Hugging Face videolarında token yalnızca Hugging Face alan adlarına gönderilir."

  android_studio:
    name: Aurora Studio Mobile v0.1.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android 36 paketleri
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug

      - name: Studio Mobile paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.1.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.1.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile.txt

      - name: Studio Mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.1.0
          path: yayin/*

      - name: Studio Mobile Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.1.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.1.0 yayin/* \
            --title "Aurora Studio Mobile v0.1.0" \
            --notes "Ayrı mobil yönetim uygulaması. GitHub katalog yönetimi, Hugging Face Xet-backed depoya Git LFS uyumluluk katmanı üzerinden yükleme, 9.000 öğelik shard sistemi, ISRC tekrar kullanımı, serbest feat isimleri, Explicit E seçimi ve kapak/video yükleme desteği."

  windows:
    name: Aurora Studio Windows v0.2.3
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıklar ve doğrulama
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py
          python -c "from huggingface_hub import HfApi; assert hasattr(HfApi, 'preupload_lfs_files')"
          if (Select-String -Path pc/AuroraStudio.py -Pattern 'HF_HUB_DISABLE_XET' -Quiet) { throw 'Xet kapatılmamalı' }
          if (-not (Select-String -Path pc/AuroraStudio.py -Pattern 'HF_HUB_DISABLE_PROGRESS_BARS' -Quiet)) { throw 'Windowed tqdm düzeltmesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudio.py -Pattern 'featuredArtistNames' -Quiet)) { throw 'Serbest feat desteği eksik' }
          if (-not (Select-String -Path pc/AuroraStudio.py -Pattern 'APP_VERSION = "0.2.3"' -Quiet)) { throw 'Studio sürümü yanlış' }

      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import win32timezone `
            pc/AuroraStudio.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Windows paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.2.3.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.2.3.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.2.3.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio.txt

      - name: Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.2.3
          path: yayin/*

      - name: Windows Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.2.3 --cleanup-tag --yes 2>$null
          gh release create aurora-studio-v0.2.3 yayin/* `
            --title "Aurora Studio Windows v0.2.3" `
            --notes "Xet açık, görünmez konsol tqdm hatası giderilmiş, serbest feat isimleri ve Explicit E desteği eklenmiş sürüm. Shard sistemi, tek commit akışı ve 128 commit/saat koruması korunur."
