name: Aurora Music 0.4.0 / Studio Mobile 0.2.0 / Studio Windows 0.3.0 Build

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "catalog/schema.json"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-v030-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "studioapp/**"
      - "pc/**"
      - "catalog/schema.json"
      - "settings.gradle.kts"
      - ".github/workflows/aurora-v030-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android_music:
    name: Aurora Music Android v0.4.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Kalıcı Android imzasını yükle
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1

      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"

      - name: Android 36 paketleri
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Aurora Music APK derle
        run: gradle --no-daemon --stacktrace --console=plain :app:assembleDebug

      - name: Aurora Music paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/Aurora-Music-Android-v0.4.0.apk
          sha256sum yayin/Aurora-Music-Android-v0.4.0.apk > yayin/SHA256SUMS-Aurora-Music.txt

      - name: Aurora Music artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.4.0
          path: yayin/*

      - name: Aurora Music Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.4.0 --cleanup-tag --yes || true
          gh release create v0.4.0 yayin/* \
            --title "Aurora Music Android v0.4.0" \
            --notes "Spotify benzeri dinamik ana sayfa bölümleri, sanatçı popülerleri, sanatçı seçkileri, üç yayınlık diskografi önizlemesi, iki sütun Tüm Diskografi ekranı, metadata-only Yakında ve kısmi yayın desteği, kilitli parçalar ve yalnızca hazır parçaları oynatma. Kalıcı Android imzası sayesinde uygulama ayarları ve şifreli token güncellemede korunur."

  android_studio:
    name: Aurora Studio Mobile v0.2.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Kalıcı Android imzasını yükle
        id: signing
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: aurora-android-signing-v1

      - name: İmza yoksa üret
        if: steps.signing.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Aurora Android Studio,OU=Personal,O=Aurora,L=Bursa,ST=Bursa,C=TR"

      - name: Android 36 paketleri
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Studio Mobile APK derle
        run: gradle --no-daemon --stacktrace --console=plain :studioapp:assembleDebug

      - name: Studio Mobile paketle
        run: |
          mkdir -p yayin
          cp studioapp/build/outputs/apk/debug/studioapp-debug.apk yayin/Aurora-Studio-Mobile-v0.2.0.apk
          sha256sum yayin/Aurora-Studio-Mobile-v0.2.0.apk > yayin/SHA256SUMS-Aurora-Studio-Mobile.txt

      - name: Studio Mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-mobile-v0.2.0
          path: yayin/*

      - name: Studio Mobile Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete aurora-studio-mobile-v0.2.0 --cleanup-tag --yes || true
          gh release create aurora-studio-mobile-v0.2.0 yayin/* --title "Aurora Studio Mobile v0.2.0" --notes "Mevcut şarkı düzenleme, metadata-only ve kısmi yayın, MusicBrainz/Cover Art Archive/LRCLIB içe aktarma, Spotify destekli eşleme, ISRC tekrar kullanımı, Görsel Fetch ve otomatik çoklu kalite kuyruğu. Tokenlar şifreli saklanır ve kalıcı imzalı güncellemede korunur."

  windows:
    name: Aurora Studio Windows v0.3.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıklar ve v0.3 doğrulaması
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py
          python -c "from huggingface_hub import HfApi; assert hasattr(HfApi, 'preupload_lfs_files')"
          if (Select-String -Path pc/AuroraStudio.py -Pattern 'HF_HUB_DISABLE_XET' -Quiet) { throw 'Xet kapatılmamalı' }
          if (-not (Select-String -Path pc/AuroraStudio.py -Pattern 'HF_HUB_DISABLE_PROGRESS_BARS' -Quiet)) { throw 'Windowed tqdm düzeltmesi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV3.py -Pattern 'APP_VERSION = "0.3.0"' -Quiet)) { throw 'Studio v0.3 sürümü yanlış' }
          if (-not (Select-String -Path pc/AuroraStudioV3.py -Pattern 'homeSections' -Quiet)) { throw 'Ana sayfa bölüm yönetimi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV3.py -Pattern 'artistLists' -Quiet)) { throw 'Sanatçı listesi yönetimi eksik' }
          if (-not (Select-String -Path pc/AuroraStudioV3.py -Pattern 'MusicBrainz' -Quiet)) { throw 'Ücretsiz metadata içe aktarma eksik' }

      - name: Qt arayüzünü ekransız başlat
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM = "offscreen"
          python -c "import sys; sys.path.insert(0, 'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV3Entry as entry; app=QApplication([]); window=entry.AuroraStudioV3Final(); assert window.pages.count() == 9; assert window.catalog['schemaVersion'] >= 5; window.close(); print('Aurora Studio v0.3 UI smoke test OK')"

      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --paths pc `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import AuroraStudio `
            --hidden-import AuroraStudioV3 `
            --hidden-import win32timezone `
            pc/AuroraStudioV3Entry.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Windows paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.3.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.3.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.3.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio.txt

      - name: Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.3.0
          path: yayin/*

      - name: Windows Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.3.0 --cleanup-tag --yes 2>$null
          gh release create aurora-studio-v0.3.0 yayin/* `
            --title "Aurora Studio Windows v0.3.0" `
            --notes "Ücretsiz MusicBrainz/Cover Art Archive/LRCLIB metadata içe aktarma, metadata-only ve kısmi yayın, ISRC tekrar kullanımı, Görsel Fetch, hareketli medya URL alanı, sanatçı popüler sıralaması, sanatçı listeleri ve dinamik ana sayfa bölüm yönetimi. Tokenlar Windows DPAPI ile korunur."
