name: Aurora 0.3.0 Build
# PR üzerindeki Android ve Windows doğrulama derlemesi.

on:
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - "pc/**"
      - "catalog/schema.json"
      - ".github/workflows/aurora-v030-build.yml"
  push:
    branches: [main]
    paths:
      - "app/**"
      - "pc/**"
      - "catalog/schema.json"
      - ".github/workflows/aurora-v030-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v030-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Aurora Music Android v0.3.0
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Android 36 paketleri
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: APK derle
        run: gradle --no-daemon --stacktrace --console=plain assembleDebug

      - name: APK paketle
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk yayin/aurora-music-v0.3.0.apk
          sha256sum yayin/aurora-music-v0.3.0.apk > yayin/SHA256SUMS-Aurora-Music.txt

      - name: Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v0.3.0
          path: yayin/*

      - name: Android Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete v0.3.0 --cleanup-tag --yes || true
          gh release create v0.3.0 yayin/* \
            --title "Aurora Music Android v0.3.0" \
            --notes "Dikey mobil tasarım, sanatçı sayfasında az göster/tümünü gör ve sıralama, mobil yönetim panelinin kaldırılması, feat sanatçı gösterimi, şifreli Hugging Face gated token desteği ve anlaşılır oynatma hataları."

  windows:
    name: Aurora Studio Windows v0.2.0
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıklar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
          python -m py_compile pc/AuroraStudio.py

      - name: FFmpeg indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import win32timezone `
            pc/AuroraStudio.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Windows paketle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath yayin\Aurora-Studio-Windows-x64-v0.2.0.zip -Force
          $hash = (Get-FileHash yayin\Aurora-Studio-Windows-x64-v0.2.0.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v0.2.0.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio.txt

      - name: Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v0.2.0
          path: yayin/*

      - name: Windows Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete aurora-studio-v0.2.0 --cleanup-tag --yes 2>$null
          gh release create aurora-studio-v0.2.0 yayin/* `
            --title "Aurora Studio Windows v0.2.0" `
            --notes "ISRC tekrar engeli, sıralı toplu master eşleştirme, Spotify metadata/ana sanatçı/feat sanatçı aktarımı, isteğe bağlı LRCLIB söz araması ve GitHub-Hugging Face yayın akışı."
