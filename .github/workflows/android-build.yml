name: Aurora Birleşik Kurulum ve Yayın

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install:
    name: Aurora kaynak paketini doğrula ve kur
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paketi doğrula, aç ve repoya kaydet
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .aurora-bundle -maxdepth 1 -name 'seg-*' | wc -l)" -eq 10
          cat .aurora-bundle/seg-* > /tmp/aurora.b64
          base64 --decode /tmp/aurora.b64 > /tmp/aurora-update.tar.gz
          echo "8c0f970adf18b690fc49d4795efc54515ca50b5f73d3f32bf02a309fc6891cb0  /tmp/aurora-update.tar.gz" | sha256sum -c -
          tar -xzf /tmp/aurora-update.tar.gz
          rm -rf .aurora-bundle .aurora-bootstrap pc/__pycache__
          rm -f .github/workflows/aurora-bootstrap.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aurora Music ve Aurora Studio kaynaklarını ekle"
          git push origin HEAD:main

  android:
    name: Aurora Music Android APK
    needs: install
    runs-on: ubuntu-latest
    env:
      SURUM: "0.2.0"
    steps:
      - name: Güncel kaynak kodu al
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android 36 paketlerini kur
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Gradle 8.11.1 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: APK derle
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace --console=plain assembleDebug 2>&1 | tee BUILD_FULL.log

      - name: APK dosyasını hazırla
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk "yayin/aurora-music-v${SURUM}.apk"
          sha256sum "yayin/aurora-music-v${SURUM}.apk" > "yayin/SHA256SUMS-Aurora-Music.txt"

      - name: Android artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-v${{ env.SURUM }}
          path: yayin/*

      - name: Aurora Music Release oluştur
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "v${SURUM}" --cleanup-tag --yes || true
          gh release create "v${SURUM}" yayin/* \
            --title "Aurora Music Android v${SURUM}" \
            --notes "Aurora Music Android: uygulamaya özel çevrimdışı arşiv, arka plan oynatma ve bildirim/kilit ekranı kontrolleri, 10 saniye hızlı geçiş, senkronize LRC sözleri, sanatçı arka planları, ayarlardan kapatılabilen hareketli albüm kapakları ve boş GitHub katalog başlangıcı." \
            --latest

      - name: Hata logunu artifact olarak yükle
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: aurora-music-android-build-log
          path: BUILD_FULL.log
          if-no-files-found: ignore

  windows:
    name: Aurora Studio Windows
    needs: install
    runs-on: windows-latest
    env:
      SURUM: "0.1.0"
    steps:
      - name: Güncel kaynak kodu al
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.12 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt

      - name: Bağımlılıkları kur
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt

      - name: FFmpeg Windows paketini indir
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:RUNNER_TEMP\ffmpeg.zip"
          Expand-Archive "$env:RUNNER_TEMP\ffmpeg.zip" "$env:RUNNER_TEMP\ffmpeg" -Force
          $ffmpeg = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobe = Get-ChildItem "$env:RUNNER_TEMP\ffmpeg" -Recurse -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpeg -or -not $ffprobe) { throw "FFmpeg araçları bulunamadı" }
          New-Item -ItemType Directory -Force pc\bundled-tools | Out-Null
          Copy-Item $ffmpeg.FullName pc\bundled-tools\ffmpeg.exe
          Copy-Item $ffprobe.FullName pc\bundled-tools\ffprobe.exe

      - name: Aurora Studio EXE üret
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --windowed --onedir `
            --name AuroraStudio `
            --collect-all huggingface_hub `
            --collect-all PySide6 `
            --hidden-import win32timezone `
            pc/AuroraStudio.py
          New-Item -ItemType Directory -Force dist\AuroraStudio\tools | Out-Null
          Copy-Item pc\bundled-tools\ffmpeg.exe dist\AuroraStudio\tools\ffmpeg.exe
          Copy-Item pc\bundled-tools\ffprobe.exe dist\AuroraStudio\tools\ffprobe.exe
          Copy-Item pc\README.md dist\AuroraStudio\KULLANIM.md

      - name: Windows paketini hazırla
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force yayin | Out-Null
          Compress-Archive -Path dist\AuroraStudio\* -DestinationPath "yayin\Aurora-Studio-Windows-x64-v$env:SURUM.zip" -Force
          $hash = (Get-FileHash "yayin\Aurora-Studio-Windows-x64-v$env:SURUM.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  Aurora-Studio-Windows-x64-v$env:SURUM.zip" | Set-Content yayin\SHA256SUMS-Aurora-Studio.txt

      - name: Windows artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: aurora-studio-windows-v${{ env.SURUM }}
          path: yayin/*

      - name: Aurora Studio Release oluştur
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release delete "aurora-studio-v$env:SURUM" --cleanup-tag --yes 2>$null
          gh release create "aurora-studio-v$env:SURUM" yayin/* `
            --title "Aurora Studio Windows v$env:SURUM" `
            --notes "Kurulum gerektirmeyen Aurora Music yönetim stüdyosu. FFmpeg, görsel katalog editörü, FLAC/WAV/M4A/MP3/AIFF işleme, Hugging Face yükleme, GitHub commit, sanatçı arka planları, hareketli kapaklar ve normal/senkronize LRC söz desteği pakete dahildir. ZIP'i çıkarıp AuroraStudio.exe dosyasını çalıştırın."
