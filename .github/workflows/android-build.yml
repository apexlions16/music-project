name: Android APK Üret ve Yayınla

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

concurrency:
  group: android-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  SURUM: "0.1.0"

jobs:
  android:
    name: Android APK oluştur
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK kur
        uses: android-actions/setup-android@v3

      - name: Android 35 paketlerini kur
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Gradle 8.9 kur
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: APK derle ve logu kaydet
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace --console=plain assembleDebug 2>&1 | tee BUILD_FULL.log

      - name: Hata logunu repoya yaz
        if: steps.build.outcome == 'failure'
        run: |
          tail -n 500 BUILD_FULL.log > BUILD_LOG.txt
          cat > BUILD_STATUS.json <<EOF
          {
            "durum": "failure",
            "mesaj": "Android derlemesi başarısız oldu. BUILD_LOG.txt dosyasına bakın.",
            "surum": "${SURUM}",
            "commit": "${GITHUB_SHA}",
            "actionsUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "releaseUrl": ""
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add BUILD_LOG.txt BUILD_STATUS.json
          git commit -m "Android derleme hatasını kaydet [skip ci]" || true
          git push origin HEAD:main

      - name: APK dosyasını hazırla
        if: steps.build.outcome == 'success'
        run: |
          mkdir -p yayin
          cp app/build/outputs/apk/debug/app-debug.apk "yayin/muzik-projesi-v${SURUM}.apk"
          sha256sum "yayin/muzik-projesi-v${SURUM}.apk" > "yayin/SHA256SUMS.txt"

      - name: Derleme çıktısını sakla
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: muzik-projesi-android-v${{ env.SURUM }}
          path: yayin/*

      - name: Önceki aynı sürümü kaldır
        if: steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "v${SURUM}" --cleanup-tag --yes || true

      - name: GitHub Release oluştur
        if: steps.build.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${SURUM}" yayin/* \
            --title "Müzik Projesi Android v${SURUM}" \
            --notes "İlk Android sürümü. Tamamen Türkçe, Apple Music esintili özgün telefon arayüzü; GitHub katalog sistemi; çevrimiçi oynatma; kalite seçimi; şarkı sözleri ve cihaz indirme desteği içerir." \
            --latest

      - name: Başarı durumunu repoya yaz
        if: steps.build.outcome == 'success'
        run: |
          rm -f BUILD_LOG.txt
          cat > BUILD_STATUS.json <<EOF
          {
            "durum": "success",
            "mesaj": "APK başarıyla derlendi ve GitHub Release olarak yayımlandı.",
            "surum": "${SURUM}",
            "commit": "${GITHUB_SHA}",
            "actionsUrl": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            "releaseUrl": "https://github.com/${GITHUB_REPOSITORY}/releases/tag/v${SURUM}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add BUILD_STATUS.json
          git rm --ignore-unmatch BUILD_LOG.txt
          git commit -m "Başarılı Android derlemesini kaydet [skip ci]" || true
          git push origin HEAD:main

      - name: Derlemeyi başarısız olarak işaretle
        if: steps.build.outcome == 'failure'
        run: exit 1
