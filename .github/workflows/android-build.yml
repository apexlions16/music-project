name: Aurora Kaynak Kurulumu

on:
  push:
    branches: [main]
    paths:
      - "AURORA_TRIGGER.txt"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  install:
    name: Aurora kaynaklarını doğrula ve kur
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Paketi doğrula ve repoya aç
        shell: bash
        run: |
          set -euo pipefail
          test "$(find .aurora-bundle -maxdepth 1 -name 'seg-*' | wc -l)" -eq 10
          cat .aurora-bundle/seg-* > /tmp/aurora.b64
          base64 --decode /tmp/aurora.b64 > /tmp/aurora-update.tar.gz
          echo "8c0f970adf18b690fc49d4795efc54515ca50b5f73d3f32bf02a309fc6891cb0  /tmp/aurora-update.tar.gz" | sha256sum -c -
          tar -xzf /tmp/aurora-update.tar.gz
          rm -rf .aurora-bundle .aurora-bootstrap pc/__pycache__
          rm -f .github/workflows/aurora-bootstrap.yml AURORA_TRIGGER.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aurora Music ve Aurora Studio kaynaklarını ekle"
          git push origin HEAD:main

      - name: Kalıcı Android ve Windows derlemelerini başlat
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          sleep 8
          gh workflow run android-build.yml --ref main
          gh workflow run aurora-studio-windows.yml --ref main
