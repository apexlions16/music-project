name: Verify Aurora v0.7 Android

on:
  push:
    branches: [feature/aurora-lrc-search-v070]
    paths:
      - ".github/workflows/verify-v070-android.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-lrc-search-v070
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"
      - name: İki Android uygulamasını derle
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          gradle --no-daemon --stacktrace --console=plain :app:assembleDebug :studioapp:assembleDebug 2>&1 | tee /tmp/android-v070.log
      - name: Sonucu dala kaydet
        if: always()
        run: |
          mkdir -p verification
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            cat > verification/ANDROID_V070.md <<'EOF'
          # Aurora v0.7 Android doğrulaması

          SUCCESS

          - Aurora Music Android `:app:assembleDebug`: başarılı
          - Aurora Studio Mobile `:studioapp:assembleDebug`: başarılı
          - Senkron LRC ve Studio eşitliği aynı kaynak ağacında derlendi.
          EOF
          else
            {
              echo '# Aurora v0.7 Android doğrulaması'
              echo
              echo 'FAILED'
              echo
              echo '```text'
              tail -n 240 /tmp/android-v070.log
              echo '```'
            } > verification/ANDROID_V070.md
          fi
          git config user.name "Aurora Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/ANDROID_V070.md
          git commit -m "Aurora v0.7 Android doğrulama sonucunu kaydet" || exit 0
          git push origin HEAD:feature/aurora-lrc-search-v070
      - name: Hata varsa işi düşür
        if: steps.build.outcome != 'success'
        run: exit 1
