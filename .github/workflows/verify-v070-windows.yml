name: Verify Aurora Studio Windows v0.7

on:
  push:
    branches: [feature/aurora-lrc-search-v070]
    paths:
      - ".github/workflows/verify-v070-windows.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/aurora-lrc-search-v070
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pc/requirements.txt
      - name: Bağımlılıklar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r pc/requirements.txt
      - name: Kaynak UI LRC ve EXE doğrulaması
        id: verify
        continue-on-error: true
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          $log = "$env:RUNNER_TEMP\windows-v070.log"
          & {
            python -m py_compile pc/AuroraStudio.py pc/AuroraStudioV3.py pc/AuroraStudioV3Entry.py pc/AuroraStudioV4Entry.py pc/AuroraStudioV6Entry.py pc/AuroraStudioV6Final.py pc/AuroraStudioV7Final.py
            if ($LASTEXITCODE -ne 0) { throw "py_compile başarısız" }
            $env:QT_QPA_PLATFORM = "offscreen"
            python -c "import sys; sys.path.insert(0,'pc'); from PySide6.QtWidgets import QApplication; import AuroraStudioV7Final as entry; app=QApplication([]); w=entry.AuroraStudioV7Final(); assert w.nav.count()==8; assert w.pages.count()==8; assert w.library_search_v7.placeholderText(); assert w.lrc_picker_v7.text(); w.close(); print('UI OK')"
            if ($LASTEXITCODE -ne 0) { throw "Qt UI testi başarısız" }
            python -c "import sys; sys.path.insert(0,'pc'); from AuroraStudioV7Final import normalize_lrc_v7; raw='[00:00.64] Başım girer boyumdan büyük belalara [00:04.40] Yerim pusular düşüp tenhalara [00:07.60]\"Son gecenin yok sabahı\" derler'; out=normalize_lrc_v7(raw); assert len(out.splitlines())==3,out; assert out.splitlines()[0]=='[00:00.64]Başım girer boyumdan büyük belalara',out; print(out)"
            if ($LASTEXITCODE -ne 0) { throw "LRC testi başarısız" }
            pyinstaller --noconfirm --clean --windowed --onedir --name AuroraStudio --paths pc --collect-all huggingface_hub --collect-all PySide6 --hidden-import AuroraStudio --hidden-import AuroraStudioV3 --hidden-import AuroraStudioV3Entry --hidden-import AuroraStudioV4Entry --hidden-import AuroraStudioV6Entry --hidden-import AuroraStudioV6Final --hidden-import win32timezone pc/AuroraStudioV7Final.py
            if ($LASTEXITCODE -ne 0) { throw "PyInstaller başarısız" }
          } *>&1 | Tee-Object -FilePath $log
          if ($LASTEXITCODE -ne 0) { exit 1 }
      - name: Sonucu dala kaydet
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force verification | Out-Null
          if ("${{ steps.verify.outcome }}" -eq "success") {
            @"
          # Aurora Studio Windows v0.7 doğrulaması

          SUCCESS

          - Python kaynak doğrulaması: başarılı
          - Sekiz sayfalı Qt arayüz testi: başarılı
          - Hızlı şarkı arama alanı: başarılı
          - Boşluklu ve tek satırlı LRC normalizasyonu: başarılı
          - PyInstaller EXE üretimi: başarılı
          "@ | Set-Content verification/WINDOWS_V070.md
          } else {
            "# Aurora Studio Windows v0.7 doğrulaması`n`nFAILED`n`n``````text" | Set-Content verification/WINDOWS_V070.md
            Get-Content "$env:RUNNER_TEMP\windows-v070.log" -Tail 240 | Add-Content verification/WINDOWS_V070.md
            "``````" | Add-Content verification/WINDOWS_V070.md
          }
          git config user.name "Aurora Verification Bot"
          git config user.email "actions@users.noreply.github.com"
          git add verification/WINDOWS_V070.md
          git commit -m "Aurora v0.7 Windows doğrulama sonucunu kaydet"
          if ($LASTEXITCODE -eq 0) { git pull --rebase origin feature/aurora-lrc-search-v070; git push origin HEAD:feature/aurora-lrc-search-v070 }
      - name: Hata varsa işi düşür
        if: steps.verify.outcome != 'success'
        run: exit 1
