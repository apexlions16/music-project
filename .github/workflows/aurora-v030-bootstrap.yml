name: Aurora v0.3.0 Kaynak Kurulumu

on:
  pull_request:
    branches: [main]
    paths:
      - "V030_TRIGGER.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v030-bootstrap-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  install:
    name: Doğrulanmış kaynak paketini kur
    runs-on: ubuntu-latest
    steps:
      - name: PR dalını al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Parçaları tanıla ve paketi birleştir
        shell: bash
        run: |
          set -u
          mapfile -t PARTS < <(find .aurora-v030 -maxdepth 1 -type f -name 'seg-*' | sort)
          {
            echo "part_count=${#PARTS[@]}"
            wc -c "${PARTS[@]}"
            sha256sum "${PARTS[@]}"
          } > V030_DIAGNOSTICS.txt
          cat "${PARTS[@]}" > /tmp/aurora-v030.b64
          echo "base64_bytes=$(wc -c < /tmp/aurora-v030.b64)" >> V030_DIAGNOSTICS.txt
          if base64 --decode /tmp/aurora-v030.b64 > /tmp/aurora-v030-update.tar.gz; then
            echo "bundle_sha256=$(sha256sum /tmp/aurora-v030-update.tar.gz | cut -d' ' -f1)" >> V030_DIAGNOSTICS.txt
          else
            echo "bundle_sha256=DECODE_FAILED" >> V030_DIAGNOSTICS.txt
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add V030_DIAGNOSTICS.txt
          git commit -m "Aurora paket aktarım tanılamasını kaydet" || true
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Paketi doğrula ve aç
        shell: bash
        run: |
          set -euo pipefail
          grep -qx "part_count=13" V030_DIAGNOSTICS.txt
          grep -qx "base64_bytes=55944" V030_DIAGNOSTICS.txt
          grep -qx "bundle_sha256=ca1fb6cdf5ef097da16cdaf7bfbef750b67f50eecfd5cc132013cc85c933596e" V030_DIAGNOSTICS.txt
          tar -xzf /tmp/aurora-v030-update.tar.gz

      - name: Geçici kurulum dosyalarını temizle ve dala yaz
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .aurora-v030
          rm -f V030_TRIGGER.txt V030_DIAGNOSTICS.txt .github/workflows/aurora-v030-bootstrap.yml
          git add -A
          git commit -m "Aurora kritik mobil ve Studio güncellemelerini kur"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
