name: Aurora v0.3.0 Kaynak Kurulumu

on:
  pull_request:
    branches: [main]
    paths:
      - "V030_TRIGGER.txt"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aurora-v030-bootstrap-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  install:
    name: Doğrulanmış kaynak paketini kur
    runs-on: ubuntu-latest
    steps:
      - name: PR dalını al
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Paketi birleştir, doğrula ve aç
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t PARTS < <(find .aurora-v030 -maxdepth 1 -type f -name 'seg-*' | sort)
          test "${#PARTS[@]}" -eq 12
          cat "${PARTS[@]}" > /tmp/aurora-v030.b64
          base64 --decode /tmp/aurora-v030.b64 > /tmp/aurora-v030-update.tar.gz
          echo "ca1fb6cdf5ef097da16cdaf7bfbef750b67f50eecfd5cc132013cc85c933596e  /tmp/aurora-v030-update.tar.gz" | sha256sum -c -
          tar -xzf /tmp/aurora-v030-update.tar.gz

      - name: Geçici kurulum dosyalarını temizle ve dala yaz
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .aurora-v030
          rm -f V030_TRIGGER.txt .github/workflows/aurora-v030-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aurora kritik mobil ve Studio güncellemelerini kur"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
