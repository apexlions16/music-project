name: Cleanup Aurora Final Branch

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/cleanup-aurora-final.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - name: Geçici dosyaları kaldır
        run: |
          git config user.name "Aurora Cleanup Bot"
          git config user.email "actions@users.noreply.github.com"
          git rm -f --ignore-unmatch \
            .github/workflows/apply-final-version-patch.yml \
            .github/workflows/aurora-v030-build.yml \
            .github/workflows/debug-android-v050.yml \
            .github/workflows/fix-final-ui-versions.yml \
            .github/workflows/sync-main-aurora-final.yml \
            .github/workflows/verify-spotify-playback-v050.yml \
            .github/workflows/verify-studio-mobile-spotify-only.yml \
            .github/workflows/cleanup-aurora-final.yml \
            tools/final_version_patch.py \
            verification/android-v050-build.log \
            verification/android-v050-result.txt \
            verification/spotify-playback-v050.txt \
            verification/main-sync.log \
            verification/main-sync.txt \
            studioapp/FINAL_SPOTIFY_ONLY_VERIFIED.md
          git commit -m "Geçici Aurora doğrulama dosyalarını temizle"
          git pull --rebase origin agent/aurora-studios-v030
          git push origin HEAD:agent/aurora-studios-v030
