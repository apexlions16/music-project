name: Sync Main Into Aurora Final Retry

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/sync-main-aurora-final.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - name: main değişikliklerini en son dal durumuna birleştir
        run: |
          git config user.name "Aurora Sync Bot"
          git config user.email "actions@users.noreply.github.com"
          for attempt in 1 2 3 4; do
            git fetch origin main agent/aurora-studios-v030
            git reset --hard origin/agent/aurora-studios-v030
            git merge --no-edit -X ours origin/main
            mkdir -p verification
            {
              echo "feature_head_before_sync=${GITHUB_SHA}"
              echo "main_head=$(git rev-parse origin/main)"
              echo "merged_head=$(git rev-parse HEAD)"
              echo "attempt=${attempt}"
              echo "synced_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            } > verification/main-sync.txt
            git add verification/main-sync.txt
            git commit -m "main katalog değişikliklerini Aurora final dalına eşitle"
            if git push origin HEAD:agent/aurora-studios-v030; then
              exit 0
            fi
            sleep 5
          done
          echo "main eşitlemesi dört denemede tamamlanamadı" >&2
          exit 1
