name: Sync Main Into Aurora Final Debug

on:
  push:
    branches:
      - agent/aurora-studios-v030
    paths:
      - ".github/workflows/sync-main-aurora-final.yml"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/aurora-studios-v030
          fetch-depth: 0
      - name: main değişikliklerini birleştir ve sonucu kaydet
        run: |
          git config user.name "Aurora Sync Bot"
          git config user.email "actions@users.noreply.github.com"
          git fetch origin main agent/aurora-studios-v030
          git reset --hard origin/agent/aurora-studios-v030
          set +e
          git merge --no-edit -X ours origin/main > main-sync.log 2>&1
          merge_code=$?
          set -e
          if [ "$merge_code" -ne 0 ]; then
            git merge --abort || true
          fi
          mkdir -p verification
          cp main-sync.log verification/main-sync.log
          {
            echo "feature_head_before_sync=${GITHUB_SHA}"
            echo "main_head=$(git rev-parse origin/main)"
            echo "merge_code=${merge_code}"
            echo "head_after_attempt=$(git rev-parse HEAD)"
            echo "synced_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > verification/main-sync.txt
          git add verification/main-sync.log verification/main-sync.txt
          git commit -m "main eşitleme sonucunu kaydet"
          git pull --rebase origin agent/aurora-studios-v030
          git push origin HEAD:agent/aurora-studios-v030
