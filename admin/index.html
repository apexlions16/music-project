<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Müzik Projesi Yönetim Paneli</title>
<style>
:root{color-scheme:dark;font-family:Inter,system-ui,sans-serif;background:#09090b;color:#fff}*{box-sizing:border-box}body{margin:0}main{max-width:1100px;margin:auto;padding:32px 18px 80px}h1{font-size:clamp(34px,7vw,72px);letter-spacing:-3px;margin:0}.accent{color:#ff375f}.card{background:#17171a;border:1px solid #29292f;border-radius:24px;padding:20px;margin-top:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}label{display:block;color:#aaa;margin:8px 0}input,textarea,button{width:100%;border-radius:14px;border:1px solid #34343b;background:#222226;color:#fff;padding:13px}textarea{min-height:520px;font-family:ui-monospace,monospace;line-height:1.5}button{background:#ff375f;border:0;font-weight:800;cursor:pointer}.secondary{background:#303036}.row{display:flex;gap:10px;flex-wrap:wrap}.row button{width:auto}.status{color:#aaa;white-space:pre-wrap}.warning{color:#ffbd5b}
</style>
</head>
<body><main>
<p class="accent"><b>GITHUB KATALOG YÖNETİMİ</b></p><h1>Müzik Projesi</h1><p>Sanatçı, şarkı, single, EP ve albüm kayıtlarını tek JSON üzerinden yönet.</p>
<div class="card"><div class="grid"><div><label>GitHub kullanıcı adı</label><input id="owner" value="apexlions16"></div><div><label>Repo</label><input id="repo" value="music-project"></div><div><label>Dal</label><input id="branch" value="main"></div><div><label>GitHub erişim anahtarı</label><input id="token" type="password" placeholder="fine-grained PAT"></div></div><p class="warning">Anahtar sadece bu tarayıcı sekmesinde kullanılır ve dosyaya yazılmaz.</p><div class="row"><button onclick="loadCatalog()">Kataloğu Yükle</button><button class="secondary" onclick="formatJson()">JSON'u Düzenle</button><button class="secondary" onclick="addArtist()">Sanatçı Şablonu</button><button class="secondary" onclick="addTrack()">Şarkı Şablonu</button><button class="secondary" onclick="addRelease()">Yayın Şablonu</button></div></div>
<div class="card"><label>Katalog JSON</label><textarea id="editor" spellcheck="false"></textarea><p id="status" class="status">Hazır.</p><button onclick="saveCatalog()">GitHub'a Kaydet ve Commit Oluştur</button></div>
</main><script>
let sha='';const $=id=>document.getElementById(id);function cfg(){return{owner:$('owner').value,repo:$('repo').value,branch:$('branch').value,token:$('token').value}}function headers(){const{token}=cfg();return{'Accept':'application/vnd.github+json','Authorization':`Bearer ${token}`,'X-GitHub-Api-Version':'2022-11-28'}}function status(t){$('status').textContent=t}async function loadCatalog(){try{const{owner,repo,branch}=cfg();status('Katalog yükleniyor…');const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/catalog/catalog.json?ref=${branch}`,{headers:headers()});if(!r.ok)throw new Error(await r.text());const d=await r.json();sha=d.sha;$('editor').value=decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));formatJson();status('Katalog yüklendi.')}catch(e){status('Hata: '+e.message)}}function formatJson(){try{$('editor').value=JSON.stringify(JSON.parse($('editor').value),null,2);status('JSON geçerli.')}catch(e){status('JSON hatası: '+e.message)}}function data(){return JSON.parse($('editor').value)}function write(d){d.updatedAt=new Date().toISOString();$('editor').value=JSON.stringify(d,null,2)}function id(prefix){return prefix+'_'+Date.now()}function addArtist(){const d=data();d.artists.push({id:id('artist'),slug:'yeni-sanatci',name:'Yeni Sanatçı',image:'https://',heroImage:'https://',bio:''});write(d)}function addTrack(){const d=data();d.tracks.push({id:id('track'),slug:'yeni-sarki',title:'Yeni Şarkı',artistIds:[],durationSeconds:0,lyrics:'',credits:[],sources:[{id:id('audio'),kind:'high',label:'Yüksek Kalite',codec:'AAC 256 kbps',url:'https://',downloadUrl:'https://',downloadable:true,bitrateKbps:256}]});write(d)}function addRelease(){const d=data();d.releases.push({id:id('release'),slug:'yeni-yayin',title:'Yeni Yayın',type:'single',artistIds:[],releaseDate:new Date().toISOString().slice(0,10),cover:'https://',description:'',tracks:[]});write(d)}async function saveCatalog(){try{formatJson();const{owner,repo,branch}=cfg();const content=unescape(encodeURIComponent($('editor').value));const body={message:'Kataloğu yönetim panelinden güncelle',content:btoa(content),branch};if(sha)body.sha=sha;status('GitHub commit oluşturuluyor…');const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/catalog/catalog.json`,{method:'PUT',headers:{...headers(),'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());const d=await r.json();sha=d.content.sha;status('Başarılı. Katalog GitHub’a kaydedildi.')}catch(e){status('Hata: '+e.message)}}</script></body></html>
